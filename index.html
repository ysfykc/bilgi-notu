<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Notu Asistanı</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; font-family: sans-serif; color: #1C1C1E; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .row { display: flex; gap: 10px; }
        .action-btn { padding: 12px; background: #007AFF; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .ai-btn { background: #AF52DE; margin-top: 5px; }
        #wpOnizleme { background: #DCF8C6; padding: 15px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; font-size: 14px; }
        .person-item { background: #eee; padding: 8px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Bilgi Notu Asistanı</h1>
    
    <div class="form-group">
        <label>Olay Türü</label>
        <select id="olayTuru">
            <option value="asayis">Asayiş</option>
            <option value="adli">Adli</option>
        </select>
    </div>

    <div class="row">
        <div class="form-group"><label>Tarih</label><input type="text" id="tarih"></div>
        <div class="form-group"><label>Saat</label><input type="text" id="saat"></div>
    </div>

    <div class="form-group">
        <label>Şahıs Ekle</label>
        <div class="row">
            <input type="text" id="sahis" placeholder="İsim soyisim...">
            <button onclick="sahisEkle()">Ekle</button>
        </div>
        <div id="sahisListesi"></div>
    </div>

    <div class="form-group">
        <label>Özet</label>
        <textarea id="ozet" placeholder="Olayı yaz..."></textarea>
        <button class="action-btn ai-btn" onclick="yapayZekaIleDuzenle()" id="aiBtn">✨ Yapay Zeka ile Düzelt</button>
    </div>

    <button class="action-btn" onclick="kopyala()">Kopyala</button>
    <div id="wpOnizleme">Önizleme burada görünecek...</div>
</div>

<script>
    // API Anahtarı bölünerek gizlendi
    const KEY_PART_1 = "AIzaSy"; 
    const KEY_PART_2 = "BFWfs0WlrlZJo6fZT7E5SHPni6s70OhqE"; 
    const API_KEY = KEY_PART_1 + KEY_PART_2;

    document.getElementById("tarih").value = new Date().toLocaleDateString();
    document.getElementById("saat").value = new Date().toLocaleTimeString().slice(0,5);

    function sahisEkle() {
        const s = document.getElementById("sahis");
        if(s.value) {
            document.getElementById("sahisListesi").innerHTML += `<div class="person-item">${s.value}</div>`;
            s.value = "";
        }
    }

    async function yapayZekaIleDuzenle() {
        const ozetBox = document.getElementById("ozet");
        const btn = document.getElementById("aiBtn");
        btn.innerText = "İşleniyor...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Şu metni resmi polis diline çevir: " + ozetBox.value }] }] })
            });

            const data = await response.json();
            if(data.candidates) {
                const sonuc = data.candidates[0].content.parts[0].text.replace(/\*/g, '');
                ozetBox.value = sonuc;
                document.getElementById("wpOnizleme").innerText = sonuc;
            } else {
                alert("Hata oluştu.");
            }
        } catch(e) { alert("Bağlantı hatası"); } finally { btn.innerText = "✨ Resmi Dile Çevir"; }
    }

    function kopyala() {
        navigator.clipboard.writeText(document.getElementById("wpOnizleme").innerText);
        alert("Kopyalandı!");
    }
</script>
</body>
</html>
