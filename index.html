<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Notu Asistanı</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1C1C1E;
            --text-gray: #8E8E93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .archive-btn-top {
            background: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue);
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: #fff;
            border-color: var(--ios-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .hidden { display: none !important; }

        .row {
            display: flex;
            gap: 12px;
        }
        
        .row .form-group {
            flex: 1;
        }

        .preview-box {
            background: #E5DDD5;
            border-radius: 16px;
            padding: 16px;
            position: relative;
            margin-top: 10px;
        }

        .whatsapp-msg {
            background: #DCF8C6;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            color: #000;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: #5856D6;
        }

        button.success {
            background: var(--ios-green) !important;
        }

        #archiveModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--glass-bg);
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
        }

        .archive-item {
            background: rgba(255,255,255,0.7);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .archive-item:hover {
            background: rgba(255,255,255,1);
        }

        .archive-item-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .archive-item-date {
            font-size: 12px;
            color: var(--text-gray);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div class="header-row">
            <h1><i class="fa-solid fa-shield-halved"></i> Bilgi Notu Asistanı</h1>
            <button class="archive-btn-top" onclick="arsiviAc()"><i class="fa-solid fa-folder-open"></i> Arşiv</button>
        </div>
        
        <div class="form-group">
            <label>Olay Türü (Şablon)</label>
            <select id="olayTuru" onchange="sablonDegistir()">
                <option value="asayis">Asayiş Uygulaması</option>
                <option value="adli">Adli Olay (Dolandırıcılık, Yaralama vb.)</option>
                <option value="trafik">Trafik Kazası</option>
                <option value="idari">İdari / Diğer (Seçim, Basın vb.)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Başlık Türü</label>
            <select id="baslikTuru" oninput="metinOlustur()">
                <option value="BİLGİ NOTU">BİLGİ NOTU</option>
                <option value="MAKAMA ARZ">MAKAMA ARZ</option>
            </select>
        </div>

        <div class="form-group">
            <label>Konu</label>
            <input type="text" id="konu" placeholder="Örn: Kasten Yaralama" oninput="metinOlustur()">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Tarih</label>
                <input type="text" id="tarih" placeholder="GG.AA.YYYY" oninput="metinOlustur()">
            </div>
            <div class="form-group">
                <label>Saat</label>
                <input type="text" id="saat" placeholder="SS:DD" oninput="metinOlustur()">
            </div>
        </div>

        <div class="form-group">
            <label>Olay Yeri / Adres</label>
            <input type="text" id="olayYeri" placeholder="Örn: Yunus Emre Bulvarı..." oninput="metinOlustur()">
        </div>

        <div id="adliAlanlar" class="hidden">
            <div class="row">
                <div class="form-group">
                    <label>Suç No</label>
                    <input type="text" id="sucNo" placeholder="Örn: 2026/21" oninput="metinOlustur()">
                </div>
            </div>
            <div class="form-group">
                <label>Şahıslar (Müşteki/Mağdur - Şüpheli)</label>
                <textarea id="sahislar" placeholder="Müşteki: Ali YILMAZ&#10;Şüpheli: Veli DEMİR" oninput="metinOlustur()"></textarea>
            </div>
        </div>

        <div id="asayisAlanlar">
            <div class="form-group">
                <label>Sorgulanan Şahıs Sayısı</label>
                <input type="number" id="sorgulananSahis" placeholder="Örn: 12" oninput="metinOlustur()">
            </div>
        </div>

        <div class="form-group">
            <label>Özet / Açıklama</label>
            <textarea id="ozet" placeholder="Olayın özetini buraya giriniz..." oninput="metinOlustur()"></textarea>
        </div>
    </div>

    <div class="glass-panel">
        <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Önizlemesi</label>
        <div class="preview-box">
            <div class="whatsapp-msg" id="wpOnizleme">Önizleme burada görünecek...</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" id="kaydetBtn">
                <i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet
            </button>
            <button id="kopyalaBtn" onclick="kopyala()">
                <i class="fa-regular fa-copy"></i> Kopyala
            </button>
        </div>
    </div>
</div>

<div id="archiveModal" class="hidden">
    <div class="modal-content">
        <div class="header-row">
            <h2>Geçmiş Notlar</h2>
            <button class="archive-btn-top" onclick="arsiviKapat()">Kapat</button>
        </div>
        <div id="archiveList">Yükleniyor...</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const bugun = new Date();
        const gun = String(bugun.getDate()).padStart(2, '0');
        const ay = String(bugun.getMonth() + 1).padStart(2, '0');
        const yil = bugun.getFullYear();
        document.getElementById("tarih").value = `${gun}.${ay}.${yil}`;
        
        const saat = String(bugun.getHours()).padStart(2, '0');
        const dakika = String(bugun.getMinutes()).padStart(2, '0');
        document.getElementById("saat").value = `${saat}:${dakika}`;
        
        sablonDegistir();
    });

    function sablonDegistir() {
        const tur = document.getElementById("olayTuru").value;
        const adliAlanlar = document.getElementById("adliAlanlar");
        const asayisAlanlar = document.getElementById("asayisAlanlar");
        const baslikTuru = document.getElementById("baslikTuru");

        adliAlanlar.classList.add("hidden");
        asayisAlanlar.classList.add("hidden");

        if (tur === "asayis") {
            asayisAlanlar.classList.remove("hidden");
            baslikTuru.value = "BİLGİ NOTU";
            document.getElementById("ozet").value = "Yapılan kontrollerde herhangi bir suç ve suç unsuruna rastlanılmamıştır.";
        } else if (tur === "adli") {
            adliAlanlar.classList.remove("hidden");
            baslikTuru.value = "MAKAMA ARZ";
            document.getElementById("ozet").value = "... olayla ilgili Günün Nöbetçi Cumhuriyet Savcısı aranıp alınan talimatlar doğrultusunda gerekli tahkikata başlanılmıştır.";
        } else if (tur === "trafik") {
            baslikTuru.value = "MAKAMA ARZ";
            document.getElementById("ozet").value = "... çevre güvenliği alınarak şahıslarda herhangi bir sağlık sorunu ve ambulans talebi olmadığına dair tutanak tanzim edilmiş, adli işlem yapılmaksızın trafik yönünden gerekli işlemlere başlanılmıştır.";
        } else {
            baslikTuru.value = "BİLGİ NOTU";
            document.getElementById("ozet").value = "";
        }
        metinOlustur();
    }

    function metinOlustur() {
        const tur = document.getElementById("olayTuru").value;
        const baslikTuru = document.getElementById("baslikTuru").value;
        const konu = document.getElementById("konu").value;
        const tarih = document.getElementById("tarih").value;
        const saat = document.getElementById("saat").value;
        const olayYeri = document.getElementById("olayYeri").value;
        const ozet = document.getElementById("ozet").value;

        let metin = `*${baslikTuru}*\n*Dodurga İlçe Emniyet Amirliği*🇹🇷\n\n`;

        if (tur === "adli") {
            const sucNo = document.getElementById("sucNo").value;
            const sahislar = document.getElementById("sahislar").value;
            if(konu) metin += `*Konu:* ${konu}\n`;
            if(sucNo) metin += `*Suç No:* ${sucNo}\n`;
            if(olayYeri) metin += `*Olay Yeri:* ${olayYeri}\n`;
            if(sahislar) metin += `${sahislar}\n`;
            if(tarih || saat) metin += `*Olay Tarihi ve Saati:* ${tarih} ${saat}\n`;
            metin += `\n*ÖZET:* ${ozet}\n\n`;
        } 
        else if (tur === "asayis") {
            const sorgulanan = document.getElementById("sorgulananSahis").value;
            if(tarih) metin += `*Tarih:* ${tarih}\n`;
            if(saat) metin += `*Saat:* ${saat}\n`;
            if(konu) metin += `\n*Konu:* ${konu}\n`;
            if(olayYeri) metin += `*Kontrol Yeri:* ${olayYeri}\n`;
            if(sorgulanan) metin += `*Sorgulanan Şahıs:* ${sorgulanan}\n`;
            metin += `\n${ozet}\n\n`;
        }
        else {
            if(konu) metin += `*Konu:* ${konu}\n`;
            if(tarih || saat) metin += `*Tarih/Saat:* ${tarih} ${saat}\n`;
            if(olayYeri) metin += `*Adres/Olay Yeri:* ${olayYeri}\n`;
            metin += `\n*Özet:* ${ozet}\n\n`;
        }
        metin += `*Arz ederim.*`;

        document.getElementById("wpOnizleme").innerHTML = metin.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        document.getElementById("wpOnizleme").setAttribute('data-raw', metin);
    }

    function kopyala() {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        navigator.clipboard.writeText(rawText).then(() => {
            const btn = document.getElementById("kopyalaBtn");
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopyalandı!';
            btn.classList.add("success");
            setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove("success"); }, 2000);
        });
    }

    function arsiviAc() {
        document.getElementById("archiveModal").classList.remove("hidden");
    }

    function arsiviKapat() {
        document.getElementById("archiveModal").classList.add("hidden");
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADpIRNLQEIer_gplTgwKi_EKkfcyrYoqY",
      authDomain: "maasgunu-bd353.firebaseapp.com",
      projectId: "maasgunu-bd353",
      storageBucket: "maasgunu-bd353.firebasestorage.app",
      messagingSenderId: "485904329467",
      appId: "1:485904329467:web:579d932ae8f25958901e5e",
      measurementId: "G-GQT1Q7FGDM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('kaydetBtn').addEventListener('click', async () => {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        const konu = document.getElementById("konu").value || "İsimsiz Olay";
        const btn = document.getElementById("kaydetBtn");
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...';
        
        try {
            await addDoc(collection(db, "bilginotlari"), {
                konu: konu,
                metin: rawText,
                tarih: serverTimestamp()
            });
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Kaydedildi!';
            btn.classList.add("success");
            arsiviYukle();
        } catch (e) {
            console.error("Hata:", e);
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Hata!';
        }

        setTimeout(() => { 
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet'; 
            btn.classList.remove("success"); 
        }, 2000);
    });

    async function arsiviYukle() {
        const liste = document.getElementById("archiveList");
        liste.innerHTML = "Yükleniyor...";
        try {
            const q = query(collection(db, "bilginotlari"), orderBy("tarih", "desc"));
            const querySnapshot = await getDocs(q);
            liste.innerHTML = "";
            
            if(querySnapshot.empty) {
                liste.innerHTML = "Henüz kaydedilmiş not yok.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "archive-item";
                
                let tarihStr = "Tarih Yok";
                if(data.tarih) {
                    const dateObj = data.tarih.toDate();
                    tarihStr = dateObj.toLocaleDateString('tr-TR') + " " + dateObj.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
                }

                div.innerHTML = `
                    <div class="archive-item-title">${data.konu}</div>
                    <div class="archive-item-date">${tarihStr}</div>
                `;
                div.addEventListener('click', () => {
                    navigator.clipboard.writeText(data.metin);
                    alert("Metin kopyalandı!");
                });
                liste.appendChild(div);
            });
        } catch (error) {
            console.error("Arşiv yüklenirken hata:", error);
            liste.innerHTML = "Kayıtlar yüklenemedi. Firestore kurallarını kontrol edin.";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        arsiviYukle();
    });
</script>
</body>
</html>
