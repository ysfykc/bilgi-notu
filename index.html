<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Notu Asistanı</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; font-family: sans-serif; color: #1C1C1E; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { font-size: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        .ai-btn { padding: 12px; background: #AF52DE; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .preview { background: #DCF8C6; padding: 15px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; font-size: 14px; color: #000; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Bilgi Notu Asistanı</h1>
    <textarea id="ozet" placeholder="Olay özetini buraya yaz..."></textarea>
    <button class="ai-btn" onclick="yapayZekaIleDuzenle()" id="aiBtn">✨ Resmi Dile Çevir</button>
    <div id="wpOnizleme" class="preview">Önizleme burada görünecek...</div>
</div>

<script>
    // Anahtar sızdırılmasın diye bölündü
    const KEY_PART_1 = "AIzaSy"; 
    const KEY_PART_2 = "BFWfs0WlrlZJo6fZT7E5SHPni6s70OhqE"; 
    const API_KEY = KEY_PART_1 + KEY_PART_2;

    async function yapayZekaIleDuzenle() {
        const ozetBox = document.getElementById("ozet");
        const btn = document.getElementById("aiBtn");
        
        if(!ozetBox.value) return alert("Özet giriniz!");
        
        btn.innerText = "İşleniyor...";
        
        const prompt = `Aşağıdaki metni resmi, ciddi, soğukkanlı bir polis tutanak diline çevir. Asla sohbet etme, başlık atma, giriş cümlesi kurma. Sadece doğrudan paragrafı ver: "${ozetBox.value}"`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if(data.candidates) {
                const sonuc = data.candidates[0].content.parts[0].text.replace(/\*/g, '');
                ozetBox.value = sonuc;
                document.getElementById("wpOnizleme").innerText = sonuc;
            } else {
                alert("Hata: " + JSON.stringify(data));
            }
        } catch (e) {
            alert("Bağlantı hatası.");
        } finally {
            btn.innerText = "✨ Resmi Dile Çevir";
        }
    }
</script>
</body>
</html>
