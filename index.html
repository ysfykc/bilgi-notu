<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi Notu Asistanı</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-purple: #AF52DE;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1C1C1E;
            --text-gray: #8E8E93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
            padding-bottom: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .archive-btn-top {
            background: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue);
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: #fff;
            border-color: var(--ios-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
            padding-right: 90px;
        }

        .hidden { display: none !important; }

        .row {
            display: flex;
            gap: 12px;
        }
        
        .row .form-group {
            flex: 1;
        }

        .textarea-wrapper {
            position: relative;
        }

        .action-btn {
            position: absolute;
            bottom: 12px;
            border: none;
            border-radius: 50%;
            width: 40px !important;
            height: 40px !important;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            padding: 0 !important;
            transition: all 0.3s;
        }

        .mic-btn {
            right: 12px;
            background: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue);
        }

        .mic-btn.recording {
            background: #FF3B30;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .ai-btn {
            right: 58px;
            background: rgba(175, 82, 222, 0.1);
            color: var(--ios-purple);
        }

        .ai-btn:hover {
            background: rgba(175, 82, 222, 0.2);
        }

        .ai-btn.loading {
            background: var(--ios-purple);
            color: white;
            cursor: wait;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .quick-phrases {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .phrase-chip {
            background: rgba(0, 122, 255, 0.08);
            color: var(--ios-blue);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(0, 122, 255, 0.2);
            transition: background 0.2s;
        }

        .phrase-chip:hover {
            background: rgba(0, 122, 255, 0.15);
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            margin-top: 10px;
        }

        .whatsapp-msg {
            background: #DCF8C6;
            border-radius: 14px;
            padding: 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            color: #000;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #5856D6;
        }

        .btn-add {
            background: var(--ios-blue);
            flex: none !important;
            width: 50px;
            border-radius: 12px;
            padding: 0;
        }

        button.success {
            background: var(--ios-green) !important;
        }

        .developer-credit {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .person-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 14px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .delete-person {
            color: #FF3B30;
            cursor: pointer;
            padding: 4px;
        }

        #archiveModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--glass-bg);
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
        }

        .archive-item {
            background: rgba(255,255,255,0.7);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .archive-item:hover {
            background: rgba(255,255,255,1);
        }

        .archive-item-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .archive-item-date {
            font-size: 12px;
            color: var(--text-gray);
        }
    </style>
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('PWA Aktif'))
          .catch((err) => console.log('PWA Hatası:', err));
      }
    </script>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div class="header-row">
            <h1><i class="fa-solid fa-shield-halved"></i> Bilgi Notu Asistanı</h1>
            <button class="archive-btn-top" onclick="arsiviAc()"><i class="fa-solid fa-folder-open"></i> Arşiv</button>
        </div>
        
        <div class="form-group">
            <label>Olay Türü (Şablon)</label>
            <select id="olayTuru" onchange="sablonDegistir()">
                <option value="asayis">Asayiş Uygulaması</option>
                <option value="adli">Adli Olay (Dolandırıcılık, Yaralama vb.)</option>
                <option value="trafik">Trafik Kazası</option>
                <option value="idari">İdari / Diğer (Seçim, Basın vb.)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Başlık Türü</label>
            <select id="baslikTuru" oninput="metinOlustur()">
                <option value="BİLGİ NOTU">BİLGİ NOTU</option>
                <option value="MAKAMA ARZ">MAKAMA ARZ</option>
            </select>
        </div>

        <div class="form-group">
            <label>Konu</label>
            <input type="text" id="konu" placeholder="Örn: Kasten Yaralama" oninput="metinOlustur()">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Tarih</label>
                <input type="text" id="tarih" placeholder="GG.AA.YYYY" oninput="metinOlustur()">
            </div>
            <div class="form-group">
                <label>Saat</label>
                <input type="text" id="saat" placeholder="SS:DD" oninput="metinOlustur()">
            </div>
        </div>

        <div class="form-group">
            <label>Olay Yeri / Adres</label>
            <input type="text" id="olayYeri" placeholder="Örn: Yunus Emre Bulvarı..." oninput="metinOlustur()">
        </div>

        <div id="adliAlanlar" class="hidden">
            <div class="row">
                <div class="form-group">
                    <label>Suç No</label>
                    <input type="text" id="sucNo" placeholder="Örn: 2026/21" oninput="metinOlustur()">
                </div>
            </div>
            
            <div class="form-group">
                <label>Şahıs Ekle</label>
                <div class="row" style="margin-bottom: 8px;">
                    <select id="sahisRol" style="flex: 1;">
                        <option value="Müşteki">Müşteki</option>
                        <option value="Mağdur">Mağdur</option>
                        <option value="Şüpheli">Şüpheli</option>
                        <option value="Bilgi Sahibi">Bilgi Sahibi</option>
                    </select>
                    <input type="text" id="sahisAd" placeholder="Ad Soyad" style="flex: 2;" onkeypress="if(event.key === 'Enter') sahisEkle()">
                    <button class="btn-add" onclick="sahisEkle()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="sahisListesiContainer"></div>
            </div>
        </div>

        <div id="asayisAlanlar">
            <div class="form-group">
                <label>Sorgulanan Şahıs Sayısı</label>
                <input type="number" id="sorgulananSahis" placeholder="Örn: 12" oninput="metinOlustur()">
            </div>
        </div>

        <div class="form-group">
            <label>Özet / Açıklama</label>
            <div class="textarea-wrapper">
                <textarea id="ozet" placeholder="Olayın özetini buraya giriniz veya mikrofonla yazdırınız..." oninput="metinOlustur()"></textarea>
                <button id="aiBtn" class="action-btn ai-btn" title="Yapay Zeka ile Resmi Dile Çevir" onclick="yapayZekaIleDuzenle()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                <button id="micBtn" class="action-btn mic-btn" title="Sesli Yazdır" onclick="toggleDictation()"><i class="fa-solid fa-microphone"></i></button>
            </div>
            
            <div class="quick-phrases">
                <span class="phrase-chip" onclick="ekleOzet('Günün Nöbetçi Cumhuriyet Savcısı aranıp alınan talimatlar doğrultusunda gerekli tahkikata başlanılmıştır.')">Savcı Talimatı +</span>
                <span class="phrase-chip" onclick="ekleOzet('Tahkikat evrakları ikmalen gönderilecektir.')">Evraklar İkmalen +</span>
                <span class="phrase-chip" onclick="ekleOzet('Şahsın hayati tehlikesi bulunmamaktadır.')">Hayati Tehlike Yok +</span>
                <span class="phrase-chip" onclick="ekleOzet('Gerekli çevre ve yol güvenliği sağlanmıştır.')">Çevre Güvenliği +</span>
            </div>
        </div>
    </div>

    <div class="glass-panel">
        <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Önizlemesi</label>
        <div class="preview-box">
            <div class="whatsapp-msg" id="wpOnizleme">Önizleme burada görünecek...</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" id="kaydetBtn">
                <i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet
            </button>
            <button id="kopyalaBtn" onclick="kopyala()">
                <i class="fa-regular fa-copy"></i> Kopyala
            </button>
        </div>
    </div>

    <div class="developer-credit">
        <i class="fa-solid fa-code"></i> Developed by <b>ysfykc</b>
    </div>
</div>

<div id="archiveModal" class="hidden">
    <div class="modal-content">
        <div class="header-row">
            <h2>Geçmiş Notlar</h2>
            <button class="archive-btn-top" onclick="arsiviKapat()">Kapat</button>
        </div>
        <div id="archiveList">Yükleniyor...</div>
    </div>
</div>

<script>
    // --- YAPAY ZEKA AYARLARI ---
    const GEMINI_API_KEY = "AIzaSyBjiFDzu4cBP9pzEsYPELnPDPUhNGF2OP0"; 

    async function yapayZekaIleDuzenle() {
        const ozetBox = document.getElementById("ozet");
        const orjinalMetin = ozetBox.value.trim();
        const aiBtn = document.getElementById("aiBtn");

        if(orjinalMetin === "") {
            alert("Lütfen önce düzenlenecek bir özet metni veya taslak yazın.");
            return;
        }

        aiBtn.classList.add("loading");
        aiBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        const promptText = `Sen Emniyet Teşkilatında çalışan tecrübeli bir amirsin. Sana karışık, eksik, yazım yanlışlarıyla dolu veya günlük dille yazılmış bir olay özeti vereceğim. Senden bu metni, Emniyetin standart "Bilgi Notu ve Tutanak" formatına uygun, tamamen resmi, ciddi ve nesnel bir polis diliyle yeniden yazmanı istiyorum. Yeni bir bilgi uydurma, sadece verdiğim taslağı resmi tutanak diline çevir. İşte taslak metin: "${orjinalMetin}"`;

        const requestBody = {
            contents: [{ parts: [{ text: promptText }] }],
            safetySettings: [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
            ]
        };

        try {
            // BURASI DEGISTIRILDI: v1beta yerine guncel ana surum v1, ve model olarak da gemini-2.0-flash ayarlandi.
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            
            if (data.error) {
                alert("API Hatası: " + data.error.message);
            } else if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                let aiMetin = data.candidates[0].content.parts[0].text;
                aiMetin = aiMetin.replace(/\*/g, ''); 
                ozetBox.value = aiMetin.trim();
                metinOlustur(); 
            } else {
                alert("Yapay zeka yanıt veremedi. Girdiğiniz metin çok kısa veya anlaşılmaz olabilir.");
                console.log("Hata Detayı:", data);
            }
        } catch (error) {
            console.error(error);
            alert("Bağlantı hatası oluştu. Lütfen internetinizi kontrol edin.");
        } finally {
            aiBtn.classList.remove("loading");
            aiBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>';
        }
    }
    // ---------------------------

    let sahislarDizisi = [];
    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'tr-TR';

        recognition.onstart = function() {
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
        };

        recognition.onresult = function(event) {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                }
            }
            if (finalTranscript) {
                ekleOzet(finalTranscript.trim());
            }
        };

        recognition.onerror = function(event) {
            console.error('Mikrofon Hatası:', event.error);
            stopDictation();
        };

        recognition.onend = function() {
            if(isRecording) stopDictation();
        };
    }

    function toggleDictation() {
        if (!recognition) {
            alert("Telefonunuzun tarayıcısı sesli yazdırma özelliğini desteklemiyor.");
            return;
        }
        
        if (isRecording) {
            stopDictation();
        } else {
            recognition.start();
        }
    }

    function stopDictation() {
        isRecording = false;
        if(recognition) recognition.stop();
        document.getElementById('micBtn').classList.remove('recording');
    }

    function ekleOzet(metin) {
        const ozetBox = document.getElementById('ozet');
        let mevcutMetin = ozetBox.value.trim();
        ozetBox.value = mevcutMetin === "" ? metin : mevcutMetin + " " + metin;
        metinOlustur();
    }

    document.addEventListener("DOMContentLoaded", () => {
        const bugun = new Date();
        const gun = String(bugun.getDate()).padStart(2, '0');
        const ay = String(bugun.getMonth() + 1).padStart(2, '0');
        const yil = bugun.getFullYear();
        document.getElementById("tarih").value = `${gun}.${ay}.${yil}`;
        
        const saat = String(bugun.getHours()).padStart(2, '0');
        const dakika = String(bugun.getMinutes()).padStart(2, '0');
        document.getElementById("saat").value = `${saat}:${dakika}`;
        
        sablonDegistir();
    });

    function sahisEkle() {
        const rol = document.getElementById("sahisRol").value;
        const ad = document.getElementById("sahisAd").value.trim();
        
        if(ad !== "") {
            sahislarDizisi.push({ rol: rol, ad: ad });
            document.getElementById("sahisAd").value = ""; 
            sahisListesiniCiz();
            metinOlustur();
        }
    }

    function sahisSil(index) {
        sahislarDizisi.splice(index, 1);
        sahisListesiniCiz();
        metinOlustur();
    }

    function sahisListesiniCiz() {
        const container = document.getElementById("sahisListesiContainer");
        container.innerHTML = "";
        
        sahislarDizisi.forEach((sahis, index) => {
            container.innerHTML += `
                <div class="person-item">
                    <span><b>${sahis.rol}:</b> ${sahis.ad}</span>
                    <i class="fa-solid fa-trash delete-person" onclick="sahisSil(${index})"></i>
                </div>
            `;
        });
    }

    function sablonDegistir() {
        const tur = document.getElementById("olayTuru").value;
        const adliAlanlar = document.getElementById("adliAlanlar");
        const asayisAlanlar = document.getElementById("asayisAlanlar");
        const baslikTuru = document.getElementById("baslikTuru");

        adliAlanlar.classList.add("hidden");
        asayisAlanlar.classList.add("hidden");

        if (tur === "asayis") {
            asayisAlanlar.classList.remove("hidden");
            baslikTuru.value = "BİLGİ NOTU";
            document.getElementById("ozet").value = "Yapılan kontrollerde herhangi bir suç ve suç unsuruna rastlanılmamıştır.";
        } else if (tur === "adli") {
            adliAlanlar.classList.remove("hidden");
            baslikTuru.value = "MAKAMA ARZ";
            document.getElementById("ozet").value = "";
        } else if (tur === "trafik") {
            baslikTuru.value = "MAKAMA ARZ";
            document.getElementById("ozet").value = "... çevre güvenliği alınarak şahıslarda herhangi bir sağlık sorunu ve ambulans talebi olmadığına dair tutanak tanzim edilmiş, adli işlem yapılmaksızın trafik yönünden gerekli işlemlere başlanılmıştır.";
        } else {
            baslikTuru.value = "BİLGİ NOTU";
            document.getElementById("ozet").value = "";
        }
        metinOlustur();
    }

    function metinOlustur() {
        const tur = document.getElementById("olayTuru").value;
        const baslikTuru = document.getElementById("baslikTuru").value;
        const konu = document.getElementById("konu").value;
        const tarih = document.getElementById("tarih").value;
        const saat = document.getElementById("saat").value;
        const olayYeri = document.getElementById("olayYeri").value;
        const ozet = document.getElementById("ozet").value;

        let metin = `*${baslikTuru}*\n*Dodurga İlçe Emniyet Amirliği*🇹🇷\n\n`;

        if (tur === "adli") {
            const sucNo = document.getElementById("sucNo").value;
            
            if(konu) metin += `*Konu:* ${konu}\n`;
            if(sucNo) metin += `*Suç No:* ${sucNo}\n`;
            if(olayYeri) metin += `*Olay Yeri:* ${olayYeri}\n`;
            
            sahislarDizisi.forEach(sahis => {
                metin += `*${sahis.rol}:* ${sahis.ad}\n`;
            });

            if(tarih || saat) metin += `*Olay Tarihi ve Saati:* ${tarih} ${saat}\n`;
            if(ozet) metin += `\n*ÖZET:* ${ozet}\n\n`;
        } 
        else if (tur === "asayis") {
            const sorgulanan = document.getElementById("sorgulananSahis").value;
            if(tarih) metin += `*Tarih:* ${tarih}\n`;
            if(saat) metin += `*Saat:* ${saat}\n`;
            if(konu) metin += `\n*Konu:* ${konu}\n`;
            if(olayYeri) metin += `*Kontrol Yeri:* ${olayYeri}\n`;
            if(sorgulanan) metin += `*Sorgulanan Şahıs:* ${sorgulanan}\n`;
            if(ozet) metin += `\n${ozet}\n\n`;
        }
        else {
            if(konu) metin += `*Konu:* ${konu}\n`;
            if(tarih || saat) metin += `*Tarih/Saat:* ${tarih} ${saat}\n`;
            if(olayYeri) metin += `*Adres/Olay Yeri:* ${olayYeri}\n`;
            if(ozet) metin += `\n*Özet:* ${ozet}\n\n`;
        }
        metin += `*Arz ederim.*`;

        document.getElementById("wpOnizleme").innerHTML = metin.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        document.getElementById("wpOnizleme").setAttribute('data-raw', metin);
    }

    function kopyala() {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        navigator.clipboard.writeText(rawText).then(() => {
            const btn = document.getElementById("kopyalaBtn");
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopyalandı!';
            btn.classList.add("success");
            setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove("success"); }, 2000);
        });
    }

    function arsiviAc() {
        document.getElementById("archiveModal").classList.remove("hidden");
    }

    function arsiviKapat() {
        document.getElementById("archiveModal").classList.add("hidden");
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADpIRNLQEIer_gplTgwKi_EKkfcyrYoqY",
      authDomain: "maasgunu-bd353.firebaseapp.com",
      projectId: "maasgunu-bd353",
      storageBucket: "maasgunu-bd353.firebasestorage.app",
      messagingSenderId: "485904329467",
      appId: "1:485904329467:web:579d932ae8f25958901e5e",
      measurementId: "G-GQT1Q7FGDM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('kaydetBtn').addEventListener('click', async () => {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        const konu = document.getElementById("konu").value || "İsimsiz Olay";
        const btn = document.getElementById("kaydetBtn");
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...';
        
        try {
            await addDoc(collection(db, "bilginotlari"), {
                konu: konu,
                metin: rawText,
                tarih: serverTimestamp()
            });
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Kaydedildi!';
            btn.classList.add("success");
            arsiviYukle();
        } catch (e) {
            console.error("Hata:", e);
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i> Hata!';
        }

        setTimeout(() => { 
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet'; 
            btn.classList.remove("success"); 
        }, 2000);
    });

    async function arsiviYukle() {
        const liste = document.getElementById("archiveList");
        liste.innerHTML = "Yükleniyor...";
        try {
            const q = query(collection(db, "bilginotlari"), orderBy("tarih", "desc"));
            const querySnapshot = await getDocs(q);
            liste.innerHTML = "";
            
            if(querySnapshot.empty) {
                liste.innerHTML = "Henüz kaydedilmiş not yok.";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "archive-item";
                
                let tarihStr = "Tarih Yok";
                if(data.tarih) {
                    const dateObj = data.tarih.toDate();
                    tarihStr = dateObj.toLocaleDateString('tr-TR') + " " + dateObj.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
                }

                div.innerHTML = `
                    <div class="archive-item-title">${data.konu}</div>
                    <div class="archive-item-date">${tarihStr}</div>
                `;
                div.addEventListener('click', () => {
                    navigator.clipboard.writeText(data.metin);
                    alert("Metin panoya kopyalandı!");
                });
                liste.appendChild(div);
            });
        } catch (error) {
            console.error("Arşiv yüklenirken hata:", error);
            liste.innerHTML = "Kayıtlar yüklenemedi. Firestore kurallarını kontrol edin.";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        arsiviYukle();
    });
</script>
