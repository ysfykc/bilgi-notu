<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilgi Notu & Tutanak Asistanı v2.0</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">
    <meta name="theme-color" content="#1e3c72" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-green: #34C759; 
            --glass-bg: rgba(255, 255, 255, 0.95); 
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-dark: #1C1C1E; 
            --text-gray: #6e6e73; 
            --input-bg: #f2f2f7; 
            --wp-bg: #DCF8C6; 
            --wp-text: #000000;
            --panel-shadow: rgba(0, 0, 0, 0.2);
            --chip-bg: rgba(0, 122, 255, 0.1);
            --body-bg: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
        }

        body.dark-mode {
            --glass-bg: rgba(28, 28, 30, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dark: #F2F2F7;
            --text-gray: #AEAEB2;
            --input-bg: rgba(255, 255, 255, 0.08);
            --wp-bg: #054c44; 
            --wp-text: #E9EDEF;
            --panel-shadow: rgba(0, 0, 0, 0.5);
            --chip-bg: rgba(10, 132, 255, 0.15);
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --body-bg: linear-gradient(135deg, #000000 0%, #1C1C1E 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--body-bg);
            min-height: 100vh; padding: 10px; color: var(--text-dark); padding-bottom: 40px; 
            transition: background 0.4s ease;
        }

        .container { max-width: 650px; margin: 0 auto; display: none; }
        
        /* GİRİŞ EKRANI (LOGIN) */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--body-bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .login-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 40px 24px; width: 100%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center;
        }
        .login-box i { font-size: 50px; color: var(--ios-blue); margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 10px; font-weight: 700; color: var(--text-dark); }
        .login-box p { font-size: 14px; color: var(--text-gray); margin-bottom: 30px; }
        .login-box input { text-align: center; font-size: 20px; letter-spacing: 2px; font-weight: bold; margin-bottom: 20px; width: 100%; background: var(--input-bg); border: none; border-radius: 12px; padding: 14px;}
        .login-box button { width: 100%; background: var(--ios-blue); color: #fff; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }

        /* SEKME (TAB) BUTONLARI */
        .tab-container { display: flex; gap: 8px; margin-bottom: 16px; background: var(--glass-bg); padding: 6px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(20px);}
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; color: var(--text-gray); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px;}
        .tab-btn.active { background: var(--ios-blue); color: white; box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3); }

        .glass-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 8px 30px var(--panel-shadow); 
            transition: all 0.3s ease;
        }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: nowrap; gap: 8px;}
        h1 { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;}
        
        .top-btn-group { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto;}
        .archive-btn-top { background: var(--input-bg); color: var(--ios-blue); border: none; padding: 8px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: transform 0.1s; }
        .archive-btn-top:active { transform: scale(0.95); opacity: 0.7; }
        .btn-danger { color: #FF3B30; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--text-gray); margin-bottom: 6px; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            width: 100%; background: var(--input-bg); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 12px; padding: 12px 14px; 
            font-size: 16px; color: var(--text-dark); 
            transition: all 0.3s ease; outline: none;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { border-color: rgba(255,255,255,0.05); }
        input:focus, select:focus, textarea:focus { border-color: var(--ios-blue); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }
        
        textarea { resize: vertical; min-height: 200px; padding-right: 100px; line-height: 1.5; }
        .hidden { display: none !important; }
        .row { display: flex; gap: 10px; } .row .form-group { flex: 1; }
        .textarea-wrapper { position: relative; }
        
        .action-btn { position: absolute; bottom: 12px; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 17px; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.9); }
        .mic-btn { right: 12px; background: var(--chip-bg); color: var(--ios-blue); }
        .nlp-btn { right: 58px; background: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
        .action-btn.recording { background: #FF3B30; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        
        .quick-phrases { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .phrase-chip { background: var(--chip-bg); color: var(--ios-blue); padding: 8px 6px; border-radius: 12px; font-size: 11.5px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; text-align: center; align-items: center; transition: opacity 0.2s, transform 0.1s; border: 1px solid rgba(0, 122, 255, 0.1); width: 100%;}
        .phrase-chip:active { transform: scale(0.96); opacity: 0.8; }
        .chip-green { background: rgba(52, 199, 89, 0.15); color: var(--ios-green); border-color: rgba(52, 199, 89, 0.3); }
        .chip-full { grid-column: span 2; padding: 10px; font-size: 13px;} 
        
        .whatsapp-msg { background: var(--wp-bg); border-radius: 16px; padding: 14px; font-size: 15px; white-space: pre-wrap; color: var(--wp-text); margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); line-height: 1.5;}
        
        .btn-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        button.bot-btn { flex: 1; min-width: 110px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: transform 0.1s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        button.bot-btn:active { transform: scale(0.97); }
        .btn-secondary { background: #5856D6; box-shadow: 0 4px 12px rgba(88, 86, 214, 0.2); } 
        .btn-add { background: var(--ios-blue); color: white; width: 50px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.9); }
        
        .developer-credit { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        .developer-credit b { font-weight: 700; color: #fff; }
        .version-tag { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; background: rgba(0, 0, 0, 0.3); padding: 4px 8px; border-radius: 10px; color: #fff;}

        .checklist-title { font-size: 13px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; padding-bottom: 4px; cursor: pointer;}
        .check-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 14px; background: var(--input-bg); padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: opacity 0.2s;}
        .check-item input { width: 20px; height: 20px; pointer-events: none; accent-color: var(--ios-blue); } 
        .check-item.done { opacity: 0.5; text-decoration: line-through; }
        .sahis-card { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background: var(--input-bg); padding: 10px 14px; border-radius: 12px; font-size: 14px;}

        /* A4 YAZDIRMA (PRINT) MOTORU CSS AYARLARI */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea {
                position: absolute; left: 0; top: 0; width: 100%;
                background: white; color: black; font-family: "Times New Roman", Times, serif; font-size: 12pt;
                line-height: 1.5; text-align: justify; padding: 20px 40px; box-sizing: border-box;
            }
            .print-title { text-align: center; font-weight: bold; margin-bottom: 20px; text-decoration: underline; font-size: 14pt;}
            .print-signatures { display: flex; justify-content: space-between; margin-top: 60px; page-break-inside: avoid;}
            .print-sig-box { text-align: center; width: 45%; }
        }
        #printArea { display: none; } /* Ekranda gizli, sadece yazıcıda görünür */
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <i class="fa-solid fa-shield-halved"></i>
        <h2>Dijital Karakol</h2>
        <p>Ortak arşive erişmek için personel şifresini giriniz.</p>
        <input type="password" id="loginPassword" placeholder="Parola" onkeypress="if(event.key === 'Enter') girisYap()">
        <button onclick="girisYap()">Giriş Yap</button>
    </div>
</div>

<div class="container" id="appContainer">
    
    <div class="tab-container">
        <button class="tab-btn active" id="tabBilgiNotuBtn" onclick="sekmeDegistir('bilgiNotu')"><i class="fa-brands fa-whatsapp"></i> Bilgi Notu</button>
        <button class="tab-btn" id="tabTutanakBtn" onclick="sekmeDegistir('tutanak')"><i class="fa-solid fa-file-signature"></i> Tutanak</button>
    </div>

    <div id="bilgiNotuBolumu">
        <div class="glass-panel">
            <div class="header-row">
                <h1><i class="fa-brands fa-whatsapp" style="color: var(--ios-blue);"></i> WhatsApp Bildirimi</h1>
                <div class="top-btn-group">
                    <button class="archive-btn-top btn-danger" onclick="formuTemizle()" title="Temizle"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="archive-btn-top" onclick="toggleDarkMode()" title="Gece/Gündüz Modu"><i id="darkIcon" class="fa-solid fa-moon"></i></button>
                    <button class="archive-btn-top" onclick="cikisYap()" title="Çıkış Yap"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Olay Türü (Şablon)</label>
                <select id="olayTuru" onchange="sablonDegistir()">
                    <option value="asayis">Asayiş Uygulaması</option>
                    <option value="asayis_trafik">Asayiş ve Trafik Uygulaması</option>
                    <option value="adli">Adli Olay</option>
                    <option value="trafik">Trafik Kazası</option>
                    <option value="idari">İdari / Diğer</option>
                </select>
            </div>

            <div id="adliAltKutu" class="form-group hidden">
                <label style="color: var(--ios-blue);">Adli Vaka Türü</label>
                <select id="adliTuru" onchange="adliTurSecildi()" style="border: 1px solid rgba(0, 122, 255, 0.3); background: rgba(0, 122, 255, 0.05);">
                    <option value="">Lütfen vaka türünü seçin...</option>
                    <option value="Adli Vaka">Adli Vaka (Genel)</option>
                    <option value="Kasten Yaralama">Kasten Yaralama</option>
                    <option value="Nitelikli Dolandırıcılık">Nitelikli Dolandırıcılık</option>
                    <option value="Evden Hırsızlık">Evden Hırsızlık</option>
                    <option value="İşyerinden Hırsızlık">İşyerinden Hırsızlık</option>
                    <option value="Tehdit ve Hakaret">Tehdit ve Hakaret</option>
                    <option value="Mala Zarar Verme">Mala Zarar Verme</option>
                    <option value="Taksirle Yaralama">Taksirle Yaralama</option>
                    <option value="Kayıp Şahıs">Kayıp Şahıs</option>
                </select>
            </div>

            <div class="form-group">
                <label>Başlık Türü</label>
                <select id="baslikTuru" oninput="metinOlustur()"><option value="BİLGİ NOTU">BİLGİ NOTU</option><option value="MAKAMA ARZ">MAKAMA ARZ</option></select>
            </div>

            <div class="form-group"><label>Konu</label><input type="text" id="konu" placeholder="Örn: Kasten Yaralama" oninput="metinOlustur()"></div>

            <div class="row">
                <div class="form-group"><label>Tarih</label><input type="text" id="tarih" oninput="metinOlustur()"></div>
                <div class="form-group"><label>Saat</label><input type="text" id="saat" oninput="metinOlustur()"></div>
            </div>

            <div class="form-group"><label>Olay Yeri / Adres</label><input type="text" id="olayYeri" placeholder="Örn: Yunus Emre Bulvarı" oninput="metinOlustur()"></div>

            <div id="adliAlanlar" class="hidden">
                <div class="form-group"><label>Suç No</label><input type="text" id="sucNo" placeholder="Örn: 33" oninput="metinOlustur()"></div>
                <div class="form-group">
                    <label>Şahıs Ekle</label>
                    <input type="number" id="sahisTc" placeholder="T.C. Kimlik No (Opsiyonel)" oninput="tcKontrolEt()" style="margin-bottom: 8px;">
                    <div class="row" style="margin-bottom: 8px;">
                        <select id="sahisRol" style="flex: 1;"><option value="Müşteki">Müşteki</option><option value="Şüpheli">Şüpheli</option><option value="Mağdur">Mağdur</option><option value="Bilgi Sahibi">Bilgi Sahibi</option></select>
                        <input type="text" id="sahisAd" placeholder="Ad Soyad" style="flex: 2;" onkeypress="if(event.key === 'Enter') sahisEkle()">
                        <button class="btn-add" onclick="sahisEkle()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="sahisListesiContainer"></div>
                </div>
            </div>

            <div id="asayisAlanlar">
                <div class="row">
                    <div class="form-group">
                        <label>Şahıs Sorgu</label>
                        <input type="number" id="sorgulananSahis" placeholder="Adet" oninput="metinOlustur()">
                    </div>
                    <div class="form-group">
                        <label>Araç Sorgu</label>
                        <input type="number" id="sorgulananArac" placeholder="Adet" oninput="metinOlustur()">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Özet / Açıklama</label>
                <div class="textarea-wrapper">
                    <textarea id="ozet" placeholder="Olayın özetini buraya girin..." oninput="metinOlustur()"></textarea>
                    <button class="action-btn nlp-btn" title="Sihirli Değnek" onclick="akilliMetinAnalizi()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                    <button id="micBtn" class="action-btn mic-btn" title="Sesli Yazdır" onclick="toggleDictation()"><i class="fa-solid fa-microphone"></i></button>
                </div>
                
                <div class="quick-phrases">
                    <span class="phrase-chip chip-green chip-full" onclick="otomatikGirisEkle()"><i class="fa-solid fa-pen-nib" style="margin-right: 5px;"></i> Otomatik Giriş Yaz</span>
                    <span class="phrase-chip" onclick="ekleOzet('Günün Nöbetçi Cumhuriyet Savcısı aranıp alınan talimatlar doğrultusunda tahkikata başlanılmıştır.')">Savcı Talimatı +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Tahkikat evrakları ikmalen gönderilecektir.')">Evraklar İkmalen +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Şahsın hayati tehlikesi bulunmamaktadır.')">Hayati Tehlike Yok +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Gerekli çevre ve yol güvenliği sağlanmıştır.')">Çevre Güvenliği +</span>
                </div>
            </div>
        </div>

        <div class="glass-panel" id="checklistPanel">
            <div class="checklist-title" onclick="toggleChecklist()">
                <div style="display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-list-check" style="color: var(--ios-blue);"></i> Kontrol Listesi</div>
                <i id="checklistIcon" class="fa-solid fa-chevron-up" style="color: var(--text-gray); font-size:14px;"></i>
            </div>
            <div id="checkListItemsContainer" style="margin-top:12px;"></div>
        </div>

        <div class="glass-panel">
            <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Önizlemesi</label>
            <div class="whatsapp-msg" id="wpOnizleme">Önizleme burada görünecek...</div>
            <div class="btn-group">
                <button class="bot-btn" id="kopyalaBtn" onclick="kopyala()"><i class="fa-regular fa-copy"></i> Kopyala</button>
                <button class="bot-btn" id="wpGonderBtn" onclick="whatsappGonder()" style="background: var(--ios-green); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);"><i class="fa-brands fa-whatsapp"></i> Paylaş</button>
            </div>
        </div>
    </div>

    <div id="tutanakBolumu" style="display:none;">
        <div class="glass-panel">
            <div class="header-row">
                <h1><i class="fa-solid fa-file-signature" style="color: var(--ios-blue);"></i> Tutanak Asistanı</h1>
                <button class="archive-btn-top btn-danger" onclick="tutanakTemizle()"><i class="fa-solid fa-trash-can"></i> Temizle</button>
            </div>

            <div class="form-group">
                <label>Tutanak Türü (Şablon)</label>
                <select id="tutTuru" onchange="tutanakSablonDegistir()" style="border: 1px solid var(--ios-blue); background: rgba(0, 122, 255, 0.05);">
                    <option value="adres_tespit">Adres Tespit Tutanağı</option>
                    <option value="kamera_tanik">Kamera ve Tanık Araştırma Tutanağı</option>
                    <option value="kayip_esya">Kayıp Eşya Tutanağı</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group"><label>Tarih</label><input type="text" id="tutTarih"></div>
                <div class="form-group"><label>Saat</label><input type="text" id="tutSaat"></div>
            </div>

            <div id="tutAdresTespitAlanlari">
                <div class="form-group"><label>Aranan Şahıs (Ad Soyad - TC)</label><input type="text" id="tutSahis" placeholder="Örn: Ahmet YILMAZ (TC: 12345678901)"></div>
                <div class="form-group"><label>Konu / Suç</label><input type="text" id="tutAdresKonu" placeholder="Örn: Kasten Yaralama"></div>
                <div class="form-group"><label>Gidilen Adres</label><input type="text" id="tutGidilenAdres" placeholder="Örn: Esentepe Mah. 3. Cadde No:5 Dodurga/Çorum"></div>
                <div class="form-group">
                    <label>Adres Durumu</label>
                    <select id="tutAdresDurumu">
                        <option value="ikamet_ediyor">Şahsın bu adreste ikamet ettiği tespit edilmiştir.</option>
                        <option value="ayrilmis">Şahsın bu adresten taşındığı/ayrıldığı tespit edilmiştir.</option>
                        <option value="taninmiyor">Şahsın bu adreste hiç oturmadığı ve tanınmadığı tespit edilmiştir.</option>
                    </select>
                </div>
            </div>

            <div id="tutKameraAlanlari" class="hidden">
                <div class="form-group"><label>Olay Yeri / Adres</label><input type="text" id="tutOlayYeri" placeholder="Örn: Yunus Emre Bulvarı"></div>
                <div class="form-group"><label>Meydana Gelen Olay</label><input type="text" id="tutKameraKonu" placeholder="Örn: Evden Hırsızlık"></div>
                <div class="row">
                    <div class="form-group">
                        <label>Güvenlik Kamerası</label>
                        <select id="tutKameraDurumu"><option value="yok">Bulunamadı / Yok</option><option value="var">Kamera Tespit Edildi</option></select>
                    </div>
                    <div class="form-group">
                        <label>Görgü Tanığı</label>
                        <select id="tutTanikDurumu"><option value="yok">Bulunamadı / Yok</option><option value="var">Tanık Tespit Edildi</option></select>
                    </div>
                </div>
            </div>

            <div id="tutKayipEsyaAlanlari" class="hidden">
                <div class="form-group"><label>Müracaatçı (Ad Soyad - TC)</label><input type="text" id="tutMuracaatci" placeholder="Örn: Ayşe DEMİR (TC: 12345678901)"></div>
                <div class="form-group"><label>Kaybolan Eşya Detayı</label><textarea id="tutEsyaDetayi" placeholder="Örn: İçerisinde 500 TL para ve kimlik kartları bulunan siyah renkli deri cüzdan" style="min-height:80px;"></textarea></div>
            </div>

            <hr style="border: 0; height: 1px; background: rgba(0,0,0,0.1); margin: 20px 0;">
            <label style="color:var(--ios-blue);"><i class="fa-solid fa-users"></i> Tutanak Tutanlar (Sicil Hafızası)</label>
            <div class="row">
                <div class="form-group"><label>1. Memur Sicil / Ad Soyad</label><input type="text" id="tutMemur1" placeholder="Örn: 123456 Polis Memuru Ali" onchange="sicilKaydet()"></div>
                <div class="form-group"><label>2. Memur Sicil / Ad Soyad</label><input type="text" id="tutMemur2" placeholder="Örn: 654321 Polis Memuru Veli" onchange="sicilKaydet()"></div>
            </div>
            
            <button class="bot-btn" style="background: var(--ios-green); width: 100%; margin-top: 10px; font-size: 16px; padding: 16px;" onclick="tutanakYazdir()"><i class="fa-solid fa-print"></i> A4 Olarak Yazdır / PDF İndir</button>
        </div>
    </div>
    
    <div class="developer-credit">
        <i class="fa-solid fa-code"></i> Developed by <b>ysfykc</b><br>
        <span class="version-tag">v2.0 Phase 1</span>
    </div>
</div>

<div id="printArea">
    <div id="printContent"></div>
</div>

<script>
    const SISTEM_SIFRESI = "Dodurga155";

    document.addEventListener("DOMContentLoaded", () => {
        if(localStorage.getItem('polis_ag_giris_izni') === 'true') {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "block";
            
            // Tarih ve saatleri otomatik doldur
            const bugun = new Date();
            const trh = `${String(bugun.getDate()).padStart(2, '0')}.${String(bugun.getMonth() + 1).padStart(2, '0')}.${bugun.getFullYear()}`;
            const st = `${String(bugun.getHours()).padStart(2, '0')}:${String(bugun.getMinutes()).padStart(2, '0')}`;
            document.getElementById("tarih").value = trh; document.getElementById("saat").value = st;
            document.getElementById("tutTarih").value = trh; document.getElementById("tutSaat").value = st;

            // Kayıtlı sicilleri çek
            if(localStorage.getItem('tut_memur1')) document.getElementById("tutMemur1").value = localStorage.getItem('tut_memur1');
            if(localStorage.getItem('tut_memur2')) document.getElementById("tutMemur2").value = localStorage.getItem('tut_memur2');
        }
    });

    function girisYap() {
        if(document.getElementById("loginPassword").value === SISTEM_SIFRESI) {
            localStorage.setItem('polis_ag_giris_izni', 'true');
            location.reload();
        } else alert("Hatalı Parola!");
    }
    function cikisYap() { localStorage.removeItem('polis_ag_giris_izni'); location.reload(); }

    // TAB (SEKME) SİSTEMİ
    function sekmeDegistir(sekme) {
        document.getElementById("tabBilgiNotuBtn").classList.remove("active");
        document.getElementById("tabTutanakBtn").classList.remove("active");
        document.getElementById("bilgiNotuBolumu").style.display = "none";
        document.getElementById("tutanakBolumu").style.display = "none";

        if(sekme === 'bilgiNotu') {
            document.getElementById("tabBilgiNotuBtn").classList.add("active");
            document.getElementById("bilgiNotuBolumu").style.display = "block";
        } else {
            document.getElementById("tabTutanakBtn").classList.add("active");
            document.getElementById("tutanakBolumu").style.display = "block";
        }
    }

    // BİLGİ NOTU KODLARI (v1.7)
    function isimFormatla(metin) {
        let kelimeler = metin.trim().split(/\s+/);
        if(kelimeler.length === 0 || metin.trim() === "") return "";
        if(kelimeler.length === 1) return kelimeler[0].replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
        let soyad = kelimeler.pop().replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
        let adKismi = kelimeler.map(k => {
            if(k.length === 0) return "";
            let ilkHarf = k.charAt(0).replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
            let geriKalan = k.slice(1).toLocaleLowerCase('tr-TR');
            return ilkHarf + geriKalan;
        }).join(" ");
        return adKismi + " " + soyad;
    }

    function toggleChecklist() {
        const container = document.getElementById("checkListItemsContainer");
        const icon = document.getElementById("checklistIcon");
        container.classList.toggle("hidden");
        icon.classList.toggle("fa-chevron-down", container.classList.contains("hidden"));
        icon.classList.toggle("fa-chevron-up", !container.classList.contains("hidden"));
    }

    function otomatikGirisEkle() {
        const trh = document.getElementById("tarih").value || "...";
        const st = document.getElementById("saat").value || "...";
        const yer = document.getElementById("olayYeri").value || "...";
        const kn = document.getElementById("konu").value || "olay";
        const txt = `${trh} günü saat ${st} sıralarında ${yer} adresinde meydana gelen ${kn} olayı ile ilgili olarak; `;
        const ozetBox = document.getElementById('ozet');
        ozetBox.value = ozetBox.value.trim() === "" ? txt : txt + "\n\n" + ozetBox.value;
        metinOlustur();
    }

    function sablonDegistir() {
        const tur = document.getElementById("olayTuru").value;
        document.getElementById("adliAlanlar").classList.toggle("hidden", tur !== "adli");
        document.getElementById("adliAltKutu").classList.toggle("hidden", tur !== "adli");
        document.getElementById("asayisAlanlar").classList.toggle("hidden", !(tur === "asayis" || tur === "asayis_trafik"));
        document.getElementById("baslikTuru").value = (tur === "adli" || tur === "trafik") ? "MAKAMA ARZ" : "BİLGİ NOTU";
        metinOlustur();
    }
    
    function adliTurSecildi() {
        const secim = document.getElementById("adliTuru").value;
        if (secim) { document.getElementById("konu").value = secim; metinOlustur(); }
    }

    function metinOlustur() {
        const baslikTuru = document.getElementById("baslikTuru").value;
        let metin = `*${baslikTuru}*\n*Dodurga İlçe Emniyet Amirliği*🇹🇷\n\n*Konu:* ${document.getElementById("konu").value}\n*Olay Yeri:* ${document.getElementById("olayYeri").value}\n*Tarih/Saat:* ${document.getElementById("tarih").value} ${document.getElementById("saat").value}\n\n*ÖZET:*\n${document.getElementById("ozet").value}\n\n*Arz ederim.*`;
        document.getElementById("wpOnizleme").innerHTML = metin.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        document.getElementById("wpOnizleme").setAttribute('data-raw', metin);
    }

    function kopyala() {
        navigator.clipboard.writeText(document.getElementById("wpOnizleme").getAttribute('data-raw'));
        alert("Kopyalandı!");
    }

    function whatsappGonder() {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(rawText), '_blank');
    }

    // ==========================================
    // V2.0 TUTANAK ASİSTANI VE PDF MOTORU KODLARI
    // ==========================================

    function tutanakSablonDegistir() {
        const tur = document.getElementById("tutTuru").value;
        document.getElementById("tutAdresTespitAlanlari").classList.toggle("hidden", tur !== "adres_tespit");
        document.getElementById("tutKameraAlanlari").classList.toggle("hidden", tur !== "kamera_tanik");
        document.getElementById("tutKayipEsyaAlanlari").classList.toggle("hidden", tur !== "kayip_esya");
    }

    function sicilKaydet() {
        localStorage.setItem('tut_memur1', document.getElementById("tutMemur1").value);
        localStorage.setItem('tut_memur2', document.getElementById("tutMemur2").value);
    }

    function tutanakYazdir() {
        const tur = document.getElementById("tutTuru").value;
        const tarih = document.getElementById("tutTarih").value;
        const saat = document.getElementById("tutSaat").value;
        const memur1 = document.getElementById("tutMemur1").value;
        const memur2 = document.getElementById("tutMemur2").value;
        
        let baslik = "";
        let icerik = "";

        if(tur === "adres_tespit") {
            baslik = "TUTANAKTIR";
            const sahis = isimFormatla(document.getElementById("tutSahis").value) || ".........................";
            const konu = document.getElementById("tutAdresKonu").value || ".........................";
            const adres = document.getElementById("tutGidilenAdres").value || ".........................";
            const dDurum = document.getElementById("tutAdresDurumu");
            const durumMetni = dDurum.options[dDurum.selectedIndex].text;

            icerik = `&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Dodurga İlçe Emniyet Amirliği sorumluluk alanı içerisinde yürütülen tahkikat ve çalışmalar kapsamında, ${konu} konusu ile ilgili olarak; <b>${sahis}</b> isimli şahsın adres tespiti ve tebligat işlemleri amacıyla ${tarih} günü saat ${saat} sıralarında beyan edilen <b>${adres}</b> adresine gidilmiş, adreste yapılan araştırma ve kontroller neticesinde; <br><br> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>${durumMetni}</b><br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;İş bu tutanak olay yerinde tarafımızdan tanzim edilerek doğruluğu okunup birlikte imza altına alınmıştır.`;
        } 
        else if(tur === "kamera_tanik") {
            baslik = "KAMERA VE TANIK ARAŞTIRMA TUTANAĞI";
            const olayYeri = document.getElementById("tutOlayYeri").value || ".........................";
            const konu = document.getElementById("tutKameraKonu").value || ".........................";
            const kDurum = document.getElementById("tutKameraDurumu").value === "var" ? "olayı gören GÜVENLİK KAMERASINA RASTLANILMIŞ," : "olayı gören herhangi bir güvenlik kamerasına RASTLANILMAMIŞ,";
            const tDurum = document.getElementById("tutTanikDurumu").value === "var" ? "olayı gören/bilen GÖRGÜ TANIĞI TESPİT EDİLMİŞTİR." : "olayı gören/bilen herhangi bir görgü tanığına RASTLANILMAMIŞTIR.";

            icerik = `&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${tarih} günü saat ${saat} sıralarında <b>${olayYeri}</b> adresinde meydana gelen <b>${konu}</b> olayı ile ilgili olarak; olayın aydınlatılması, şüpheli şahıs/şahısların tespit edilmesi amacıyla çevre sokak ve caddelerde tarafımızdan yapılan geniş çaplı kamera ve tanık araştırması neticesinde;<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Çevrede ${kDurum} ayrıca çevrede yapılan mülakatlarda ${tDurum}<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;İş bu tutanak tarafımızdan tanzimle doğruluğu okunup imza altına alınmıştır.`;
        }
        else if(tur === "kayip_esya") {
            baslik = "KAYIP EŞYA TUTANAĞI";
            const kisi = isimFormatla(document.getElementById("tutMuracaatci").value) || ".........................";
            const esya = document.getElementById("tutEsyaDetayi").value || ".........................";

            icerik = `&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${tarih} günü saat ${saat} sıralarında Dodurga İlçe Emniyet Amirliğimize müracaata gelen <b>${kisi}</b> isimli şahıs; kendisine ait olan ve detayları <i>"${esya}"</i> şeklinde belirtilen eşyasını/eşyalarını kendi dalgınlığı ve dikkatsizliği sonucu nerede ve ne zaman olduğunu bilmediği bir şekilde kaybettiğini, bulunması halinde tarafına teslim edilmesini beyan etmiştir.<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Şahsın beyanı üzerine gerekli form doldurulmuş olup, iş bu tutanak tarafımızdan tanzim edilerek birlikte imza altına alınmıştır.`;
        }

        // A4 HTML İSKELETİ OLUŞTURMA
        const printHTML = `
            <div style="text-align: center; font-weight: bold; margin-bottom: 30px; font-size: 13pt;">
                T.C.<br>DODURGA KAYMAKAMLIĞI<br>İlçe Emniyet Amirliği
            </div>
            <div class="print-title">${baslik}</div>
            <div>${icerik}</div>
            <div style="text-align: left; margin-top: 15px;"><b>Tarih/Saat:</b> ${tarih} - ${saat}</div>
            <div class="print-signatures">
                <div class="print-sig-box"><b>Tutanak Tutan</b><br><br><br>${memur1}</div>
                <div class="print-sig-box"><b>Tutanak Tutan</b><br><br><br>${memur2}</div>
            </div>
        `;

        document.getElementById("printContent").innerHTML = printHTML;
        
        // SİHİRLİ DOKUNUŞ: NATIVE YAZDIRMA (A4 FORMATINDA)
        window.print();
    }
</script>
</body>
</html>
