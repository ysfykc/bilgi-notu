<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilgi Notu Asistanı</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">
    <meta name="theme-color" content="#1e3c72">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --glass-bg: rgba(255, 255, 255, 0.85); --text-dark: #1C1C1E; --text-gray: #8E8E93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; color: var(--text-dark); padding-bottom: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 20px; font-weight: 700; margin: 0; }
        .archive-btn-top { background: rgba(0, 122, 255, 0.1); color: var(--ios-blue); border: none; padding: 8px 12px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 12px; padding: 12px 16px; font-size: 15px; }
        textarea { resize: vertical; min-height: 140px; padding-right: 50px; }
        .hidden { display: none !important; }
        .row { display: flex; gap: 12px; } .row .form-group { flex: 1; }
        .textarea-wrapper { position: relative; }
        .action-btn { position: absolute; bottom: 12px; right: 12px; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; background: rgba(0, 122, 255, 0.1); color: var(--ios-blue); }
        .action-btn.recording { background: #FF3B30; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        .quick-phrases { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .phrase-chip { background: rgba(0, 122, 255, 0.08); color: var(--ios-blue); padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; }
        .whatsapp-msg { background: #DCF8C6; border-radius: 14px; padding: 14px; font-size: 14px; white-space: pre-wrap; color: #000; margin-top: 10px; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        button.bot-btn { flex: 1; min-width: 120px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .btn-secondary { background: #5856D6; } .btn-add { background: var(--ios-blue); color: white; width: 50px; border-radius: 12px; border: none; cursor: pointer; }
        .developer-credit { text-align: center; margin-top: 25px; font-size: 13px; color: rgba(255, 255, 255, 0.8); }
        #archiveModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--glass-bg); width: 100%; max-width: 500px; max-height: 80vh; border-radius: 24px; padding: 20px; overflow-y: auto; }
        .archive-item { background: rgba(255,255,255,0.7); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <div class="header-row">
            <h1><i class="fa-solid fa-shield-halved"></i> Bilgi Notu</h1>
            <button class="archive-btn-top" onclick="arsiviAc()"><i class="fa-solid fa-folder-open"></i> Arşiv</button>
        </div>
        
        <div class="form-group">
            <label>Olay Türü (Şablon)</label>
            <select id="olayTuru" onchange="sablonDegistir()">
                <option value="asayis">Asayiş Uygulaması</option>
                <option value="asayis_trafik">Asayiş ve Trafik Uygulaması</option>
                <option value="adli">Adli Olay (Dolandırıcılık, Yaralama vb.)</option>
                <option value="trafik">Trafik Kazası</option>
                <option value="idari">İdari / Diğer</option>
            </select>
        </div>

        <div class="form-group">
            <label>Başlık Türü</label>
            <select id="baslikTuru" oninput="metinOlustur()"><option value="BİLGİ NOTU">BİLGİ NOTU</option><option value="MAKAMA ARZ">MAKAMA ARZ</option></select>
        </div>

        <div class="form-group"><label>Konu</label><input type="text" id="konu" placeholder="Örn: Kasten Yaralama" oninput="metinOlustur()"></div>

        <div class="row">
            <div class="form-group"><label>Tarih</label><input type="text" id="tarih" oninput="metinOlustur()"></div>
            <div class="form-group"><label>Saat</label><input type="text" id="saat" oninput="metinOlustur()"></div>
        </div>

        <div class="form-group"><label>Olay Yeri / Adres</label><input type="text" id="olayYeri" placeholder="Örn: Yunus Emre Bulvarı" oninput="metinOlustur()"></div>

        <div id="adliAlanlar" class="hidden">
            <div class="form-group"><label>Suç No</label><input type="text" id="sucNo" oninput="metinOlustur()"></div>
            <div class="form-group">
                <label>Şahıs Ekle</label>
                <div class="row" style="margin-bottom: 8px;">
                    <select id="sahisRol" style="flex: 1;"><option value="Müşteki">Müşteki</option><option value="Şüpheli">Şüpheli</option><option value="Mağdur">Mağdur</option><option value="Bilgi Sahibi">Bilgi Sahibi</option></select>
                    <input type="text" id="sahisAd" placeholder="Ad Soyad" style="flex: 2;" onkeypress="if(event.key === 'Enter') sahisEkle()">
                    <button class="btn-add" onclick="sahisEkle()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="sahisListesiContainer"></div>
            </div>
        </div>

        <div id="asayisAlanlar">
            <div class="row">
                <div class="form-group">
                    <label>Sorgulanan Şahıs Sayısı</label>
                    <input type="number" id="sorgulananSahis" oninput="metinOlustur()">
                </div>
                <div class="form-group">
                    <label>Sorgulanan Araç Sayısı</label>
                    <input type="number" id="sorgulananArac" oninput="metinOlustur()">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Özet / Açıklama</label>
            <div class="textarea-wrapper">
                <textarea id="ozet" placeholder="Olayın özetini yazın..." oninput="metinOlustur()"></textarea>
                <button id="micBtn" class="action-btn" title="Sesli Yazdır" onclick="toggleDictation()"><i class="fa-solid fa-microphone"></i></button>
            </div>
            
            <div class="quick-phrases">
                <span class="phrase-chip" onclick="ekleOzet('Günün Nöbetçi Cumhuriyet Savcısı aranıp alınan talimatlar doğrultusunda gerekli tahkikata başlanılmıştır.')">Savcı Talimatı +</span>
                <span class="phrase-chip" onclick="ekleOzet('Tahkikat evrakları ikmalen gönderilecektir.')">Evraklar İkmalen +</span>
                <span class="phrase-chip" onclick="ekleOzet('Şahsın hayati tehlikesi bulunmamaktadır.')">Hayati Tehlike Yok +</span>
                <span class="phrase-chip" onclick="ekleOzet('Gerekli çevre ve yol güvenliği sağlanmıştır.')">Çevre Güvenliği +</span>
            </div>

            <div id="dinamikPhrases" class="quick-phrases" style="margin-top: 6px;"></div>
            <div style="margin-top: 10px; display: flex; gap: 8px;">
                <input type="text" id="yeniCumleInput" placeholder="Kendi özel hazır cümleni buraya ekle..." style="padding: 10px 14px; font-size: 14px; border-radius: 12px;">
                <button class="btn-add" onclick="yeniCumleEkle()" style="width: 45px; border-radius: 12px;"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div class="glass-panel">
        <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Önizlemesi</label>
        <div class="whatsapp-msg" id="wpOnizleme">Önizleme burada görünecek...</div>
        <div class="btn-group">
            <button class="bot-btn btn-secondary" id="kaydetBtn" onclick="kaydetVeArsivle()"><i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet</button>
            <button class="bot-btn" id="kopyalaBtn" onclick="kopyala()"><i class="fa-regular fa-copy"></i> Kopyala</button>
            <button class="bot-btn" id="wpGonderBtn" onclick="whatsappGonder()" style="background: #25D366;"><i class="fa-brands fa-whatsapp"></i> Paylaş</button>
        </div>
    </div>
    
    <div class="developer-credit"><i class="fa-solid fa-code"></i> Developed by <b>ysfykc</b></div>
</div>

<div id="archiveModal" class="hidden">
    <div class="modal-content">
        <div class="header-row">
            <h2>Geçmiş Notlar</h2>
            <button class="archive-btn-top" onclick="arsiviKapat()">Kapat</button>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <input type="text" id="archiveSearch" placeholder="Arşivde kelime, şahıs veya konu ara..." oninput="arsivFiltrele()" style="background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 12px;">
        </div>
        <div id="archiveList">Yükleniyor...</div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

    let sahislarDizisi = [];
    let ozelCumleler = JSON.parse(localStorage.getItem('ozel_cumleler')) || [];
    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'tr-TR';

        recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); };
        recognition.onresult = (event) => {
            let trans = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) trans += event.results[i][0].transcript + ' ';
            }
            if (trans) ekleOzet(trans.trim());
        };
        recognition.onerror = () => stopDictation();
        recognition.onend = () => { if(isRecording) stopDictation(); };
    }

    function toggleDictation() {
        if (!recognition) { alert("Tarayıcınız sesle yazdırmayı desteklemiyor."); return; }
        isRecording ? stopDictation() : recognition.start();
    }

    function stopDictation() {
        isRecording = false;
        if(recognition) recognition.stop();
        document.getElementById('micBtn').classList.remove('recording');
    }

    function ekleOzet(metin) {
        const ozetBox = document.getElementById('ozet');
        let m = ozetBox.value.trim();
        ozetBox.value = m === "" ? metin : m + "\n\n" + metin;
        metinOlustur();
    }

    // Yenilik 5: Özel cümle yönetim fonksiyonları
    function ozelCumleleriCiz() {
        const container = document.getElementById("dinamikPhrases");
        container.innerHTML = "";
        ozelCumleler.forEach((cumle, index) => {
            container.innerHTML += `
                <span class="phrase-chip" style="background: rgba(88, 86, 214, 0.08); color: #5856D6; border: 1px solid rgba(88, 86, 214, 0.2); padding-right: 28px; position: relative;" onclick="ekleOzet('${cumle}')">
                    ${cumle}
                    <i class="fa-solid fa-xmark" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #FF3B30; cursor: pointer; padding: 2px;" onclick="event.stopPropagation(); ozelCumleSil(${index})"></i>
                </span>`;
        });
    }

    function yeniCumleEkle() {
        const val = document.getElementById("yeniCumleInput").value.trim();
        if(val) {
            ozelCumleler.push(val);
            localStorage.setItem('ozel_cumleler', JSON.stringify(ozelCumleler));
            document.getElementById("yeniCumleInput").value = "";
            ozelCumleleriCiz();
        }
    }

    function ozelCumleSil(index) {
        ozelCumleler.splice(index, 1);
        localStorage.setItem('ozel_cumleler', JSON.stringify(ozelCumleler));
        ozelCumleleriCiz();
    }

    // Yenilik 6: Akıllı Plaka Formatlayıcı (Gömülü Regex Motoru)
    function plakaFormatla(text) {
        if (!text) return "";
        // 01-81 il kodlarını ve TR plaka kombinasyonlarını (Harf ve sayı bloklarını) yakalayıp standart boşluk bırakır.
        return text.replace(/\b([0-8][0-9])\s*([a-zA-Z]{1,3})\s*(\d{2,5})\b/g, function(match, sehir, harf, sayi) {
            return sehir + " " + harf.toUpperCase() + " " + sayi;
        });
    }

    // Yenilik 3: Otomatik Taslak Veri Koruma Altyapısı
    function taslakKaydet() {
        const taslak = {
            olayTuru: document.getElementById("olayTuru").value,
            baslikTuru: document.getElementById("baslikTuru").value,
            konu: document.getElementById("konu").value,
            tarih: document.getElementById("tarih").value,
            saat: document.getElementById("saat").value,
            olayYeri: document.getElementById("olayYeri").value,
            sucNo: document.getElementById("sucNo").value,
            sorgulananSahis: document.getElementById("sorgulananSahis").value,
            sorgulananArac: document.getElementById("sorgulananArac").value,
            ozet: document.getElementById("ozet").value,
            sahislarDizisi: sahislarDizisi
        };
        localStorage.setItem('taslak_not_verisi', JSON.stringify(taslak));
    }

    function taslakYukle() {
        const veri = localStorage.getItem('taslak_not_verisi');
        if (veri) {
            const taslak = JSON.parse(veri);
            document.getElementById("olayTuru").value = taslak.olayTuru || "asayis";
            sablonDegistir();
            
            document.getElementById("baslikTuru").value = taslak.baslikTuru || "BİLGİ NOTU";
            document.getElementById("konu").value = taslak.konu || "";
            document.getElementById("tarih").value = taslak.tarih || "";
            document.getElementById("saat").value = taslak.saat || "";
            document.getElementById("olayYeri").value = taslak.olayYeri || "";
            document.getElementById("sucNo").value = taslak.sucNo || "";
            document.getElementById("sorgulananSahis").value = taslak.sorgulananSahis || "";
            document.getElementById("sorgulananArac").value = taslak.sorgulananArac || "";
            document.getElementById("ozet").value = taslak.ozet || "";
            sahislarDizisi = taslak.sahislarDizisi || [];
            
            sahisListesiniCiz();
            metinOlustur();
        } else {
            const bugun = new Date();
            document.getElementById("tarih").value = `${String(bugun.getDate()).padStart(2, '0')}.${String(bugun.getMonth() + 1).padStart(2, '0')}.${bugun.getFullYear()}`;
            document.getElementById("saat").value = `${String(bugun.getHours()).padStart(2, '0')}:${String(bugun.getMinutes()).padStart(2, '0')}`;
            sablonDegistir();
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        taslakYukle();
        ozelCumleleriCiz();
    });

    function sahisEkle() {
        const rol = document.getElementById("sahisRol").value;
        const ad = document.getElementById("sahisAd").value.trim();
        if(ad !== "") { 
            sahislarDizisi.push({ rol, ad }); 
            document.getElementById("sahisAd").value = ""; 
            sahisListesiniCiz(); 
            metinOlustur(); 
        }
    }

    function sahisListesiniCiz() {
        const container = document.getElementById("sahisListesiContainer");
        container.innerHTML = "";
        sahislarDizisi.forEach((sahis, index) => {
            container.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background: rgba(255, 255, 255, 0.6); padding: 8px; border-radius: 8px;"><span><b>${sahis.rol}:</b> ${sahis.ad}</span><i class="fa-solid fa-trash" style="color:red; cursor:pointer;" onclick="sahisSil(${index})"></i></div>`;
        });
    }

    function sahisSil(index) {
        sahislarDizisi.splice(index, 1);
        sahisListesiniCiz();
        metinOlustur();
    }

    function sablonDegistir() {
        const tur = document.getElementById("olayTuru").value;
        const ozetBox = document.getElementById("ozet");
        
        document.getElementById("adliAlanlar").classList.toggle("hidden", tur !== "adli");
        
        const asayisMi = (tur === "asayis" || tur === "asayis_trafik");
        document.getElementById("asayisAlanlar").classList.toggle("hidden", !asayisMi);
        
        if (tur === "asayis") { 
            document.getElementById("baslikTuru").value = "BİLGİ NOTU"; 
            ozetBox.value = "Yapılan kontrollerde herhangi bir suç ve suç unsuruna rastlanılmamıştır.";
        } 
        else if (tur === "asayis_trafik") { 
            document.getElementById("baslikTuru").value = "BİLGİ NOTU"; 
            ozetBox.value = "Yapılan asayiş ve trafik kontrollerinde herhangi bir suç ve suç unsuruna rastlanılmamıştır.";
        }
        else if (tur === "adli") { 
            document.getElementById("baslikTuru").value = "MAKAMA ARZ"; 
            ozetBox.value = "";
        }
        else if (tur === "trafik") { 
            document.getElementById("baslikTuru").value = "MAKAMA ARZ"; 
            ozetBox.value = "... çevre güvenliği alınarak şahıslarda herhangi bir sağlık sorunu ve ambulans talebi olmadığına dair tutanak tanzim edilmiş, adli işlem yapılmaksızın trafik yönünden gerekli işlemlere başlanılmıştır.";
        }
        else {
            document.getElementById("baslikTuru").value = "BİLGİ NOTU";
            ozetBox.value = "";
        }
        
        metinOlustur();
    }

    function metinOlustur() {
        const tur = document.getElementById("olayTuru").value;
        const baslikTuru = document.getElementById("baslikTuru").value;
        const konu = document.getElementById("konu").value;
        const tarih = document.getElementById("tarih").value;
        const saat = document.getElementById("saat").value;
        const olayYeri = document.getElementById("olayYeri").value;
        let ozet = document.getElementById("ozet").value;

        // Plaka formatlama motoru devreye giriyor
        ozet = plakaFormatla(ozet);

        let metin = `*${baslikTuru}*\n*Dodurga İlçe Emniyet Amirliği*🇹🇷\n\n`;
        if(konu) metin += `*Konu:* ${konu}\n\n`;
        if(tur === "adli" && document.getElementById("sucNo").value) metin += `*Suç No:* ${document.getElementById("sucNo").value}\n\n`;
        if(olayYeri) metin += `*Olay Yeri:* ${olayYeri}\n\n`;
        if(tarih || saat) metin += `*Tarih/Saat:* ${tarih} ${saat}\n\n`;
        
        if(tur === "asayis" || tur === "asayis_trafik") {
            if(document.getElementById("sorgulananSahis").value) metin += `*Sorgulanan Şahıs:* ${document.getElementById("sorgulananSahis").value}\n\n`;
            if(document.getElementById("sorgulananArac").value) metin += `*Sorgulanan Araç:* ${document.getElementById("sorgulananArac").value}\n\n`;
        }
        
        sahislarDizisi.forEach(s => { metin += `*${s.rol}:* ${s.ad}\n\n`; });
        
        if(ozet) metin += `*ÖZET:*\n${ozet}\n\n`;
        metin += `*Arz ederim.*`;

        document.getElementById("wpOnizleme").innerHTML = metin.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        document.getElementById("wpOnizleme").setAttribute('data-raw', metin);
        
        // Veri kaybını önlemek için her tuş vuruşunda taslağı hafızaya kaydeder.
        taslakKaydet();
    }

    function kopyala() {
        navigator.clipboard.writeText(document.getElementById("wpOnizleme").getAttribute('data-raw'));
        const btn = document.getElementById("kopyalaBtn");
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopyalandı!';
        setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Kopyala'; }, 2000);
    }

    // Yenilik 2: Doğrudan tek tıkla WhatsApp API Gönderim Sistemi
    function whatsappGonder() {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(rawText);
        window.open(url, '_blank');
    }

    // Yenilik 4: Arşiv İçi Canlı Arama Motoru
    function arsivFiltrele() {
        const queryStr = document.getElementById("archiveSearch").value.toLowerCase().trim();
        const items = document.querySelectorAll(".archive-item");
        items.forEach(item => {
            const itemText = item.innerText.toLowerCase();
            if (itemText.includes(queryStr)) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    }

    function arsiviAc() { document.getElementById("archiveModal").classList.remove("hidden"); document.getElementById("archiveSearch").value = ""; }
    function arsiviKapat() { document.getElementById("archiveModal").classList.add("hidden"); }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADpIRNLQEIer_gplTgwKi_EKkfcyrYoqY",
      authDomain: "maasgunu-bd353.firebaseapp.com",
      projectId: "maasgunu-bd353",
      storageBucket: "maasgunu-bd353.firebasestorage.app",
      messagingSenderId: "485904329467",
      appId: "1:485904329467:web:579d932ae8f25958901e5e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.kaydetVeArsivle = async function() {
        const rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
        const konu = document.getElementById("konu").value || "İsimsiz Olay";
        const btn = document.getElementById("kaydetBtn");
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>...';
        
        try {
            await addDoc(collection(db, "bilginotlari"), { konu: konu, metin: rawText, tarih: serverTimestamp() });
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Başarılı';
            arsiviYukle();
        } catch (e) { btn.innerHTML = 'Hata!'; }
        setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Arşive Kaydet'; }, 2000);
    }

    async function arsiviYukle() {
        const liste = document.getElementById("archiveList");
        try {
            const q = query(collection(db, "bilginotlari"), orderBy("tarih", "desc"));
            const querySnapshot = await getDocs(q);
            liste.innerHTML = "";
            if(querySnapshot.empty) { liste.innerHTML = "Kayıt yok."; return; }
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "archive-item";
                let tStr = "Tarih Yok";
                if(data.tarih) { const d = data.tarih.toDate(); tStr = d.toLocaleDateString('tr-TR') + " " + d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); }
                div.innerHTML = `<b>${data.konu}</b><br><small>${tStr}</small>`;
                div.addEventListener('click', () => { navigator.clipboard.writeText(data.metin); alert("Panoya kopyalandı!"); });
                liste.appendChild(div);
            });
        } catch (error) { liste.innerHTML = "Hata oluştu."; }
    }
    document.addEventListener("DOMContentLoaded", () => { arsiviYukle(); });
</script>
</body>
</html>
