<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilgi Notu v2.0</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">
    <meta name="theme-color" content="#1e3c72" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-green: #34C759; 
            --glass-bg: rgba(255, 255, 255, 0.95); 
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-dark: #1C1C1E; 
            --text-gray: #6e6e73; 
            --input-bg: #f2f2f7; 
            --wp-bg: #DCF8C6; 
            --wp-text: #000000;
            --panel-shadow: rgba(0, 0, 0, 0.2);
            --chip-bg: rgba(0, 122, 255, 0.1);
            --body-bg: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
        }

        body.dark-mode {
            --glass-bg: rgba(28, 28, 30, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dark: #F2F2F7;
            --text-gray: #AEAEB2;
            --input-bg: rgba(255, 255, 255, 0.08);
            --wp-bg: #054c44; 
            --wp-text: #E9EDEF;
            --panel-shadow: rgba(0, 0, 0, 0.5);
            --chip-bg: rgba(10, 132, 255, 0.15);
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --body-bg: linear-gradient(135deg, #000000 0%, #1C1C1E 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--body-bg);
            min-height: 100vh; padding: 10px; color: var(--text-dark); padding-bottom: 40px; 
            transition: background 0.4s ease;
        }

        .container { max-width: 650px; margin: 0 auto; display: none; }
        
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--body-bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .login-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 40px 24px; width: 100%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center;
        }
        .login-box i { font-size: 50px; color: var(--ios-blue); margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 10px; font-weight: 700; color: var(--text-dark); }
        .login-box p { font-size: 14px; color: var(--text-gray); margin-bottom: 30px; }
        .login-box input { text-align: center; font-size: 20px; letter-spacing: 2px; font-weight: bold; margin-bottom: 20px; width: 100%; background: var(--input-bg); border: none; border-radius: 12px; padding: 14px;}
        .login-box button { width: 100%; background: var(--ios-blue); color: #fff; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }

        .tab-container { display: flex; gap: 8px; margin-bottom: 16px; background: var(--glass-bg); padding: 6px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(20px);}
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; color: var(--text-gray); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px;}
        .tab-btn.active { background: var(--ios-blue); color: white; box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3); }

        .glass-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 8px 30px var(--panel-shadow); 
            transition: all 0.3s ease;
        }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: nowrap; gap: 8px;}
        h1 { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;}
        
        .top-btn-group { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto;}
        .archive-btn-top { background: var(--input-bg); color: var(--ios-blue); border: none; padding: 8px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: transform 0.1s; }
        .archive-btn-top:active { transform: scale(0.95); opacity: 0.7; }
        .btn-danger { color: #FF3B30; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--text-gray); margin-bottom: 6px; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            width: 100%; background: var(--input-bg); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 12px; padding: 12px 14px; 
            font-size: 16px; color: var(--text-dark); 
            transition: all 0.3s ease; outline: none;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { border-color: rgba(255,255,255,0.05); }
        input:focus, select:focus, textarea:focus { border-color: var(--ios-blue); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); }
        
        textarea { resize: vertical; min-height: 120px; padding-right: 100px; line-height: 1.5; }
        .hidden { display: none !important; }
        .row { display: flex; gap: 10px; } .row .form-group { flex: 1; }
        .textarea-wrapper { position: relative; }
        
        .action-btn { position: absolute; bottom: 12px; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 17px; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.9); }
        .mic-btn { right: 12px; background: rgba(0, 122, 255, 0.1); color: var(--ios-blue); }
        .nlp-btn { right: 58px; background: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
        .ai-btn { right: 104px; background: rgba(175, 82, 222, 0.15); color: #AF52DE; } /* YENİ YAPAY ZEKA BUTONU */
        .action-btn.recording { background: #FF3B30; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        
        .quick-phrases { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .phrase-chip { background: var(--chip-bg); color: var(--ios-blue); padding: 8px 6px; border-radius: 12px; font-size: 11.5px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; text-align: center; align-items: center; transition: opacity 0.2s, transform 0.1s; border: 1px solid rgba(0, 122, 255, 0.1); width: 100%;}
        .phrase-chip:active { transform: scale(0.96); opacity: 0.8; }
        .chip-green { background: rgba(52, 199, 89, 0.15); color: var(--ios-green); border-color: rgba(52, 199, 89, 0.3); }
        .chip-full { grid-column: span 2; padding: 10px; font-size: 13px;} 
        
        .whatsapp-msg { background: var(--wp-bg); border-radius: 16px; padding: 14px; font-size: 15px; white-space: pre-wrap; color: var(--wp-text); margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); line-height: 1.5;}
        
        .btn-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        button.bot-btn { flex: 1; min-width: 110px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: transform 0.1s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        button.bot-btn:active { transform: scale(0.97); }
        .btn-secondary { background: #5856D6; box-shadow: 0 4px 12px rgba(88, 86, 214, 0.2); } 
        .btn-add { background: var(--ios-blue); color: white; width: 50px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; transition: transform 0.1s; }
        .btn-add:active { transform: scale(0.9); }
        
        .developer-credit { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        .developer-credit b { font-weight: 700; color: #fff; }
        .version-tag { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; background: rgba(0, 0, 0, 0.3); padding: 4px 8px; border-radius: 10px; color: #fff;}

        #archiveModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; padding: 16px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .modal-content { background: var(--glass-bg); width: 100%; max-width: 600px; max-height: 85vh; border-radius: 24px; padding: 20px; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); margin-bottom: 10px;}
        .archive-item { background: var(--input-bg); padding: 14px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--glass-border); transition: transform 0.1s; }
        .archive-item:active { transform: scale(0.98); }
        
        .checklist-title { font-size: 13px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; padding-bottom: 4px; cursor: pointer;}
        .check-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 14px; background: var(--input-bg); padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: opacity 0.2s;}
        .check-item input { width: 20px; height: 20px; pointer-events: none; accent-color: var(--ios-blue); } 
        .check-item.done { opacity: 0.5; text-decoration: line-through; }
        .sahis-card { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background: var(--input-bg); padding: 10px 14px; border-radius: 12px; font-size: 14px;}

        @media print {
            body { background: white !important; margin: 0; padding: 0; }
            #loginScreen, #appContainer, #archiveModal { display: none !important; }
            #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; color: black; font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.5; text-align: justify; padding: 2cm 1.5cm; box-sizing: border-box; background: white; z-index: 99999;}
            .print-title { text-align: center; font-weight: bold; margin-bottom: 20px; text-decoration: underline; font-size: 14pt;}
            .print-signatures { display: flex; justify-content: space-between; margin-top: 60px; page-break-inside: avoid;}
            .print-sig-box { text-align: center; width: 45%; }
        }
        #printArea { display: none; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <i class="fa-solid fa-shield-halved"></i>
        <h2>Bilgi Notu</h2>
        <p>Ortak arşive erişmek için personel şifresini giriniz.</p>
        <input type="password" id="loginPassword" placeholder="Parola" onkeypress="if(event.key === 'Enter') girisYap()">
        <button onclick="girisYap()">Giriş Yap</button>
    </div>
</div>

<div class="container" id="appContainer">
    
    <div class="tab-container">
        <button class="tab-btn active" id="tabBilgiNotuBtn" onclick="sekmeDegistir('bilgiNotu')"><i class="fa-brands fa-whatsapp"></i> Bilgi Notu</button>
        <button class="tab-btn" id="tabTutanakBtn" onclick="sekmeDegistir('tutanak')"><i class="fa-solid fa-file-signature"></i> Tutanak</button>
    </div>

    <div id="bilgiNotuBolumu">
        <div class="glass-panel">
            <div class="header-row">
                <h1><i class="fa-brands fa-whatsapp" style="color: var(--ios-blue);"></i> WhatsApp Bildirimi</h1>
                <div class="top-btn-group">
                    <button class="archive-btn-top btn-danger" onclick="formuTemizle()" title="Temizle"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="archive-btn-top" onclick="toggleDarkMode()" title="Gece/Gündüz Modu"><i id="darkIcon" class="fa-solid fa-moon"></i></button>
                    <button class="archive-btn-top" onclick="arsiviAc()"><i class="fa-solid fa-folder-open"></i></button>
                    <button class="archive-btn-top" onclick="cikisYap()" title="Çıkış Yap"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Olay Türü (Şablon)</label>
                <select id="olayTuru" onchange="sablonDegistir()">
                    <option value="asayis">Asayiş Uygulaması</option>
                    <option value="asayis_trafik">Asayiş ve Trafik Uygulaması</option>
                    <option value="adli">Adli Olay</option>
                    <option value="trafik">Trafik Kazası</option>
                    <option value="idari">İdari / Diğer</option>
                </select>
            </div>

            <div id="adliAltKutu" class="form-group hidden">
                <label style="color: var(--ios-blue);">Adli Vaka Türü</label>
                <select id="adliTuru" onchange="adliTurSecildi()" style="border: 1px solid rgba(0, 122, 255, 0.3); background: rgba(0, 122, 255, 0.05);">
                    <option value="">Lütfen vaka türünü seçin...</option>
                    <option value="Adli Vaka">Adli Vaka (Genel)</option>
                    <option value="Kasten Yaralama">Kasten Yaralama</option>
                    <option value="Nitelikli Dolandırıcılık">Nitelikli Dolandırıcılık</option>
                    <option value="Evden Hırsızlık">Evden Hırsızlık</option>
                    <option value="İşyerinden Hırsızlık">İşyerinden Hırsızlık</option>
                    <option value="Tehdit ve Hakaret">Tehdit ve Hakaret</option>
                    <option value="Mala Zarar Verme">Mala Zarar Verme</option>
                    <option value="Taksirle Yaralama">Taksirle Yaralama</option>
                    <option value="Kayıp Şahıs">Kayıp Şahıs</option>
                </select>
            </div>

            <div class="form-group">
                <label>Başlık Türü</label>
                <select id="baslikTuru" oninput="metinOlustur()"><option value="BİLGİ NOTU">BİLGİ NOTU</option><option value="MAKAMA ARZ">MAKAMA ARZ</option></select>
            </div>

            <div class="form-group"><label>Konu</label><input type="text" id="konu" placeholder="Örn: Kasten Yaralama" oninput="metinOlustur()"></div>

            <div class="row">
                <div class="form-group"><label>Tarih</label><input type="text" id="tarih" oninput="metinOlustur()"></div>
                <div class="form-group"><label>Saat</label><input type="text" id="saat" oninput="metinOlustur()"></div>
            </div>

            <div class="form-group"><label>Olay Yeri / Adres</label><input type="text" id="olayYeri" placeholder="Örn: Yunus Emre Bulvarı" oninput="metinOlustur()"></div>

            <div id="adliAlanlar" class="hidden">
                <div class="form-group"><label>Suç No</label><input type="text" id="sucNo" placeholder="Örn: 33" oninput="metinOlustur()"></div>
                <div class="form-group">
                    <label>Şahıs Ekle</label>
                    <input type="number" id="sahisTc" placeholder="T.C. Kimlik No (Opsiyonel)" oninput="tcKontrolEt()" style="margin-bottom: 8px;">
                    <div class="row" style="margin-bottom: 8px;">
                        <select id="sahisRol" style="flex: 1;"><option value="Müşteki">Müşteki</option><option value="Şüpheli">Şüpheli</option><option value="Mağdur">Mağdur</option><option value="Bilgi Sahibi">Bilgi Sahibi</option></select>
                        <input type="text" id="sahisAd" placeholder="Ad Soyad" style="flex: 2;" onkeypress="if(event.key === 'Enter') sahisEkle()">
                        <button class="btn-add" onclick="sahisEkle()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="sahisListesiContainer"></div>
                </div>
            </div>

            <div id="asayisAlanlar">
                <div class="row">
                    <div class="form-group">
                        <label>Şahıs Sorgu</label>
                        <input type="number" id="sorgulananSahis" placeholder="Adet" oninput="metinOlustur()">
                    </div>
                    <div class="form-group">
                        <label>Araç Sorgu</label>
                        <input type="number" id="sorgulananArac" placeholder="Adet" oninput="metinOlustur()">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Özet / Açıklama</label>
                <div class="textarea-wrapper">
                    <textarea id="ozet" placeholder="Olayın özetini kısaca yazın, Yapay Zeka resmi dile çevirsin..." oninput="metinOlustur()"></textarea>
                    
                    <button class="action-btn ai-btn" title="Yapay Zekaya Yazdır" onclick="yapayZekaIleYaz('ozet')"><i class="fa-solid fa-robot"></i></button>
                    <button class="action-btn nlp-btn" title="Sihirli Değnek" onclick="akilliMetinAnalizi()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                    <button id="micBtn" class="action-btn mic-btn" title="Sesli Yazdır" onclick="toggleDictation()"><i class="fa-solid fa-microphone"></i></button>
                </div>
                
                <div id="kanunOneriAlani" class="quick-phrases" style="margin-top: 8px; display: none;"></div>

                <div class="quick-phrases">
                    <span class="phrase-chip chip-green chip-full" onclick="otomatikGirisEkle()"><i class="fa-solid fa-pen-nib" style="margin-right: 5px;"></i> Otomatik Giriş Yaz</span>
                    <span class="phrase-chip" onclick="ekleOzet('Günün Nöbetçi Cumhuriyet Savcısı aranıp alınan talimatlar doğrultusunda gerekli tahkikata başlanılmıştır.')">Savcı Talimatı +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Tahkikat evrakları ikmalen gönderilecektir.')">Evraklar İkmalen +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Şahsın hayati tehlikesi bulunmamaktadır.')">Hayati Tehlike Yok +</span>
                    <span class="phrase-chip" onclick="ekleOzet('Gerekli çevre ve yol güvenliği sağlanmıştır.')">Çevre Güvenliği +</span>
                </div>
                <div id="dinamikPhrases" class="quick-phrases" style="margin-top: 6px;"></div>
                <div style="margin-top: 10px; display: flex; gap: 8px;">
                    <input type="text" id="yeniCumleInput" placeholder="Kendi özel cümleni ekle...">
                    <button class="btn-add" onclick="yeniCumleEkle()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>

        <div class="glass-panel" id="checklistPanel">
            <div class="checklist-title" onclick="toggleChecklist()">
                <div style="display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-list-check" style="color: var(--ios-blue);"></i> Kontrol Listesi</div>
                <i id="checklistIcon" class="fa-solid fa-chevron-up" style="color: var(--text-gray); font-size:14px;"></i>
            </div>
            <div id="checkListItemsContainer" style="margin-top:12px;"></div>
        </div>

        <div class="glass-panel">
            <label><i class="fa-brands fa-whatsapp"></i> WhatsApp Önizlemesi</label>
            <div class="whatsapp-msg" id="wpOnizleme">Önizleme burada görünecek...</div>
            <div class="btn-group">
                <button class="bot-btn btn-secondary" id="kaydetBtn" onclick="kaydetVeArsivle('wp')"><i class="fa-solid fa-cloud-arrow-up"></i> Ortak Arşive Gönder</button>
                <button class="bot-btn" id="kopyalaBtn" onclick="kopyala()"><i class="fa-regular fa-copy"></i> Kopyala</button>
                <button class="bot-btn" id="wpGonderBtn" onclick="whatsappGonder()" style="background: var(--ios-green); box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);"><i class="fa-brands fa-whatsapp"></i> Paylaş</button>
            </div>
        </div>
    </div>

    <div id="tutanakBolumu" style="display:none;">
        <div class="glass-panel">
            <div class="header-row">
                <h1><i class="fa-solid fa-file-signature" style="color: var(--ios-blue);"></i> Tutanak Asistanı</h1>
                <button class="archive-btn-top btn-danger" onclick="tutanakTemizle()"><i class="fa-solid fa-trash-can"></i> Temizle</button>
            </div>

            <div class="form-group">
                <label>Tutanak Türü</label>
                <select id="tutTuru" onchange="tutanakSablonDegistir()" style="border: 1px solid var(--ios-blue); background: rgba(0, 122, 255, 0.05);">
                    <option value="ifade">İfade Tutanağı</option>
                    <option value="olay_yeri">Olay Yeri Görgü Tutanağı</option>
                    <option value="muhafaza">Muhafaza Altına Alma Tutanağı</option>
                    <option value="teslim_tesellum">Teslim Tesellüm Tutanağı</option>
                    <option value="adres_tespit">Adres Tespit Tutanağı</option>
                    <option value="kamera_tanik">Kamera ve Tanık Araştırma</option>
                    <option value="kayip_esya">Kayıp Eşya Tutanağı</option>
                    <option value="dugun_izni">Düğün/Eğlence İzin Belgesi</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group"><label>Tarih</label><input type="text" id="tutTarih"></div>
                <div class="form-group"><label>Saat</label><input type="text" id="tutSaat"></div>
            </div>

            <div id="tutOrtakAlanlar">
                <div class="form-group" id="d_olayYeri"><label>Olay Yeri / Adres</label><input type="text" id="tutOlayYeri" placeholder="Örn: Yunus Emre Bulvarı No:1"></div>
                <div class="form-group" id="d_konu"><label>Olay / Konu</label><input type="text" id="tutKonu" placeholder="Örn: Kasten Yaralama"></div>
                <div class="form-group" id="d_sahis1"><label>1. Şahıs (Ad Soyad - TC vb.)</label><input type="text" id="tutSahis1" placeholder="Müşteki/Şüpheli/Teslim Eden vb."></div>
                <div class="form-group" id="d_sahis2"><label>2. Şahıs / Kurum</label><input type="text" id="tutSahis2" placeholder="Teslim Alan vb."></div>
                
                <div class="form-group" id="d_detay">

    function isimFormatla(metin) {
        let kelimeler = metin.trim().split(/\s+/);
        if(kelimeler.length === 0 || metin.trim() === "") return "";
        if(kelimeler.length === 1) return kelimeler[0].replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
        let soyad = kelimeler.pop().replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
        let adKismi = kelimeler.map(k => {
            if(k.length === 0) return "";
            let ilkHarf = k.charAt(0).replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
            let geriKalan = k.slice(1).toLocaleLowerCase('tr-TR');
            return ilkHarf + geriKalan;
        }).join(" ");
        return adKismi + " " + soyad;
    }

    // YAPAY ZEKA (GEMINI AI) MOTORU
    // ==========================================
    async function yapayZekaIleYaz(hedefKutuId) {
        const kutu = document.getElementById(hedefKutuId);
        const kisaMetin = kutu.value.trim();
        
        if (!kisaMetin) {
            alert("Lütfen önce olayı kısaca kendi cümlelerinizle yazın.");
            return;
        }

        // BURAYA GOOGLE AI STUDIO'DAN ALDIĞIN ŞİFREYİ BÖLEREK YAPIŞTIR
        const ai_p1 = "BURAYA_1"; 
        const ai_p2 = "BURAYA_2";
        const ai_p3 = "BURAYA_3";
        const apiKey = ai_p1 + ai_p2 + ai_p3;

        if (ai_p1 === "BURAYA_1") {
            alert("Sistem uyarısı: Lütfen koda Google AI Studio şifrenizi ekleyin.");
            return;
        }

        kutu.value = "Yapay Zeka metni resmi formata çeviriyor, lütfen bekleyin...\n\n( " + kisaMetin + " )";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        const prompt = `Sen tecrübeli bir Türk Polis memurusun. Aşağıda devriyedeki bir polisin aldığı kısa olay notu bulunuyor. Lütfen bu notu, Emniyet teşkilatı resmi tutanak ve bilgi notu jargonuyla hukuki ve resmi bir metne çevir. Sadece üretilen resmi metni ver. Olay Notu: ${kisaMetin}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            if (data.candidates && data.candidates.length > 0) {
                kutu.value = data.candidates[0].content.parts[0].text.trim();
                if(hedefKutuId === 'ozet') metinOlustur();
            } else {
                kutu.value = kisaMetin;
                alert("Yapay zeka yanıt veremedi.");
            }
        } catch (error) {
            kutu.value = kisaMetin;
            alert("Bağlantı hatası! AI Şifrenizi kontrol edin.");
        }
    }

    let app, db;
    try { app = initializeApp(firebaseConfig); db = getFirestore(app); } catch(e) {}

    window.kaydetVeArsivle = async function(kaynak) {
        if(!db) { alert("Sistem bağlantı hatası!"); return; }
        
        let rawText = ""; let konu = ""; let btn = null;
        if(kaynak === 'wp') {
            rawText = document.getElementById("wpOnizleme").getAttribute('data-raw');
            konu = "[BİLGİ NOTU] " + (document.getElementById("konu").value || "İsimsiz");
            btn = document.getElementById("kaydetBtn");
        } else {
            rawText = document.getElementById("tutDetay").value;
            konu = "[TUTANAK] " + (document.getElementById("tutKonu").value || document.getElementById("tutTuru").options[document.getElementById("tutTuru").selectedIndex].text);
            btn = document.getElementById("tutKaydetBtn");
        }

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gönderiliyor...';
        
        try {
            await addDoc(collection(db, "bilginotlari"), { konu: konu, metin: rawText, tarih: serverTimestamp() });
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Ağa Eklendi';
            if(window.arsiviYukle) window.arsiviYukle();
        } catch (e) { btn.innerHTML = 'Hata (API Engeli)!'; }
        setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Ortak Arşive Gönder'; }, 2000);
    }

    window.arsiviYukle = async function() {
        if(!db) return;
        const liste = document.getElementById("archiveList");
        try {
            const q = query(collection(db, "bilginotlari"), orderBy("tarih", "desc"));
            const querySnapshot = await getDocs(q);
            liste.innerHTML = "";
            if(querySnapshot.empty) { liste.innerHTML = "<div style='text-align:center; padding:20px; color:var(--text-gray);'>Kayıt bulunamadı.</div>"; return; }
            
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const d = data.tarih ? data.tarih.toDate() : new Date();
                const tStr = d.toLocaleDateString('tr-TR') + " " + d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}); 
                
                const div = document.createElement("div");
                div.className = "archive-item";
                div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div><b style="color:var(--ios-blue);">${data.konu}</b><br><small style="color:var(--text-gray);">${tStr}</small></div>
                                    <i class="fa-solid fa-trash" style="color:#FF3B30; padding:10px;" onclick="event.stopPropagation(); kayitSilFirebase('${docSnap.id}')"></i>
                                 </div>`;
                div.addEventListener('click', () => { navigator.clipboard.writeText(data.metin); alert("Not kopyalandı!"); });
                liste.appendChild(div);
            });
        } catch (error) {}
    }

    window.kayitSilFirebase = async function(docId) {
        if(confirm("Silmek istiyor musunuz?")) {
            await deleteDoc(doc(db, "bilginotlari", docId));
            window.arsiviYukle();
        }
    }
</script>
</body>
</html>
